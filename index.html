<style>

    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem 4rem;

  .wrap { max-width: 680px; margin: 0 auto; }

    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 0.2rem;

  .subtitle {
    font-size: 0.78rem;
    font-family: var(--mono);
    color: var(--muted);
    margin-bottom: 2rem;
    letter-spacing: 0.04em;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.25rem 1.5rem;
    margin-bottom: 1rem;
  }
  .label {
    font-family: var(--mono);
    font-size: 0.65rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    display: block;
    margin-bottom: 0.6rem;
  }
  .frase-text {
    font-size: 1.35rem;
    font-style: italic;
    line-height: 1.5;
    color: var(--text);
  }
  .frase-note {
    margin-top: 0.75rem;
    padding-top: 0.75rem;
    border-top: 1px solid var(--border);
    font-size: 0.75rem;
    font-family: var(--mono);
    color: var(--muted);
    line-height: 1.6;
  }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; gap: 0.4rem;
    font-family: var(--mono); font-size: 0.78rem; font-weight: 500;
    padding: 0.55rem 1.1rem; border-radius: 7px;
    border: 1px solid var(--border);
    cursor: pointer; background: transparent; color: var(--text);
    transition: all 0.15s;
  }
  .btn:hover { background: var(--bg); border-color: #c5bfb8; }
  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
  .btn-primary {
    background: var(--text); color: #fff; border-color: var(--text);
  }
  .btn-primary:hover { background: #292524; }
  .btn-row { display: flex; gap: 0.5rem; flex-wrap: wrap; }

  /* IPA keyboard */
  .ipa-kb { margin-bottom: 1rem; }
  .ipa-group { margin-bottom: 0.6rem; }
  .ipa-group-label {
    font-family: var(--mono); font-size: 0.6rem; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.1em;
    display: block; margin-bottom: 0.35rem;
  }
  .ipa-keys { display: flex; flex-wrap: wrap; gap: 0.35rem; }
  .ipa-key {
    font-family: var(--mono); font-size: 0.9rem;
    padding: 0.3rem 0.6rem; border-radius: 5px;
    border: 1px solid var(--border); background: var(--bg);
    cursor: pointer; color: var(--text); transition: all 0.12s;
  }
  .ipa-key:hover { background: var(--accent-light); border-color: var(--accent-border); }
  .ipa-key:active { transform: scale(0.93); }

  /* Textarea */
  textarea {
    width: 100%; font-family: var(--mono); font-size: 1rem;
    padding: 0.75rem 1rem; border-radius: 8px;
    border: 1px solid var(--border); background: var(--bg);
    color: var(--text); resize: vertical; min-height: 80px;
    line-height: 1.6; outline: none; margin-bottom: 0.75rem;
    transition: border-color 0.15s;
  }
  textarea:focus { border-color: #a8a29e; }

  /* Spinner */
  .spinner {
    display: inline-block; width: 12px; height: 12px;
    border: 2px solid var(--border); border-top-color: var(--muted);
    border-radius: 50%; animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Results */
  .ipa-result {
    font-family: var(--mono); font-size: 0.95rem;
    background: var(--bg); padding: 0.75rem 1rem;
    border-radius: 7px; display: block;
    word-break: break-all; line-height: 1.8;
    margin-bottom: 0.75rem; color: var(--text);
  }
  .esito-badge {
    display: inline-block; font-family: var(--mono);
    font-size: 0.7rem; padding: 0.25rem 0.6rem;
    border-radius: 4px; margin-bottom: 0.75rem;
  }

  .esito-parziale { background: var(--yellow-bg); color: var(--yellow); }
  .esito-errato   { background: var(--red-bg);    color: var(--red);   }

  .divider { border: none; border-top: 1px solid var(--border); margin: 0.75rem 0; }

  /* Log scontri */
  .log-item {
    font-family: var(--mono); font-size: 0.72rem; color: var(--muted);
    padding: 0.2rem 0; line-height: 1.5;
  }

  /* Page 2: needs_input */
  .word-input-block {
    padding: 0.9rem 0;
    border-bottom: 1px solid var(--border);
  }
  .word-input-block:last-child { border-bottom: none; }
  .word-label {
    font-style: italic; font-size: 1.05rem; margin-bottom: 0.5rem;
  }
  .choice-row {
    display: flex; align-items: center; gap: 0.4rem;
    flex-wrap: wrap; margin-bottom: 0.35rem;
  }
  .choice-lbl {
    font-family: var(--mono); font-size: 0.65rem; color: var(--muted);
    min-width: 120px;
  }
  .cbtn {
    font-family: var(--mono); font-size: 0.75rem;
    padding: 0.25rem 0.7rem; border-radius: 5px;
    border: 1px solid var(--border); cursor: pointer;
    background: transparent; color: var(--text); transition: all 0.12s;
  }
  .cbtn:hover { background: var(--bg); }
  .cbtn.sel { background: var(--text); color: #fff; border-color: var(--text); }

  /* Source badge */
  .src { display: inline-block; font-family: var(--mono); font-size: 0.6rem;
    padding: 0.1rem 0.4rem; border-radius: 3px; margin-left: 0.3rem; }
  .src-wikt { background: #dcfce7; color: #166534; }
  .src-utente { background: #f1f5f9; color: #475569; }

  /* Unavail */
  .unavail {
    font-family: var(--mono); font-size: 0.78rem;
    color: var(--yellow); background: var(--yellow-bg);
    border: 1px solid var(--accent-border);
    border-radius: 7px; padding: 0.7rem 1rem; margin-top: 0.5rem;
  }

  /* Footer */
  footer {
    font-family: var(--mono); font-size: 0.65rem; color: #c5bfb8;
    text-align: center; margin-top: 2.5rem;
    letter-spacing: 0.05em;
  }

  /* Custom input */
  .text-input {
    width: 100%; font-family: var(--serif); font-style: italic;
    font-size: 1.1rem; padding: 0.65rem 1rem; border-radius: 8px;
    border: 1px solid var(--border); background: var(--bg);
    color: var(--text); outline: none; margin-bottom: 0.6rem;
    transition: border-color 0.15s;
  }
  .text-input:focus { border-color: #a8a29e; }

  /* Loading page */
  .loading-msg {
    font-family: var(--mono); font-size: 0.82rem;
    color: var(--muted); display: flex; align-items: center; gap: 0.5rem;
  }
</style>

// WIKTIONARY LOOKUP (it.wiktionary.org)
// ═══════════════════════════════════════════════════════
async function wiktionaryLookup(word) {
  const encoded = encodeURIComponent(word.toLowerCase());
  const url = `https://it.wiktionary.org/w/api.php?action=parse&page=${encoded}&prop=wikitext&format=json&origin=*`;
  try {
    const resp = await fetch(url);
    const data = await resp.json();
    if (!data.parse) return null;
    const wikitext = data.parse.wikitext['*'];

    // Estrai sezione italiana: == {{-it-}} == oppure =={{-it-}}==
    const itMatch = wikitext.match(/==\s*\{\{-it-\}\}\s*==([\s\S]*?)(?:\n==\s*\{\{-(?!it-)|$)/);
    if (!itMatch) return null;
    const itText = itMatch[1];

    // Sillabazione: ; scien | tì | fi | co — fonte primaria per l'accento (ortografia)
    let sill = null;
    const sillMatch = itText.match(/\{\{-sill-\}\}[\s\S]*?;\s*([^\n]+)/);
    if (sillMatch) {
      sill = sillMatch[1].replace(/\s*\|\s*/g, '').trim();
    }

    // IPA: {{IPA|/ʃʃenˈtifiko/}} — fonte per s/z sonore e qualità e/o
    let ipa = null;
    const ipaMatch = itText.match(/\{\{IPA\|\/([^/}]+)\/\}\}/);
    if (ipaMatch) {
      ipa = ipaMatch[1].trim();
    }

    // Usa sill come fonte primaria per accento, IPA per s/z e qualità vocalica
    if (sill) return { tipo: 'sill', valore: sill, ipa };
    if (ipa)  return { tipo: 'ipa', valore: ipa, ipa };

    return null;
  } catch(e) { return null; }
}

function parseWiktionaryResult(risultato, word) {
  if (!risultato) return null;

  let ipaStr = null;
  let accentoGrafico = null; // parola con accenti come in it-pr (es. "càne", "giornàta")

  if (risultato.tipo === 'ipa') {
    ipaStr = risultato.valore;
  } else if (risultato.tipo === 'it-pr' || risultato.tipo === 'sill') {
    accentoGrafico = risultato.valore;
    // Se disponibile, usa l'IPA per rilevare s/z sonore e qualità e/o
    ipaStr = risultato.ipa || null;
  }

  // Rileva s/z sonore dall'IPA (solo se disponibile)
  let hasVoicedS = ipaStr ? /(?<![dt])z(?![dt])/.test(ipaStr) : false;
  let hasVoicedZ = ipaStr ? ipaStr.includes('dz') : false;
  let hasVoicelessZ = ipaStr ? ipaStr.includes('ts') : false;
  // ṣ nel testo utente → s sonora
  if (accentoGrafico && accentoGrafico.includes('ṣ')) hasVoicedS = true;
  // Qualità e/o: dall'IPA se disponibile, altrimenti dalla sillabazione (è/ò=aperta, é/ó=chiusa)
  let hasEpsilon  = ipaStr ? ipaStr.includes('ɛ') : false;
  let hasOpenO    = ipaStr ? ipaStr.includes('ɔ') : false;
  let hasClosedE  = ipaStr ? (ipaStr.includes('e') && !ipaStr.includes('ɛ')) : false;
  let hasClosedO  = ipaStr ? (ipaStr.includes('o') && !ipaStr.includes('ɔ')) : false;
  if (accentoGrafico) {
    if (!hasEpsilon)  hasEpsilon = accentoGrafico.includes('è');
    if (!hasOpenO)    hasOpenO   = accentoGrafico.includes('ò');
    if (!hasClosedE)  hasClosedE = accentoGrafico.includes('é');
    if (!hasClosedO)  hasClosedO = accentoGrafico.includes('ó');
  }

  // Estrai accento SOLO dalla sillabazione ortografica (accentoGrafico).
  // L'IPA viene usato solo per rilevare s/z sonore e qualità e/o (sopra).
  let accento = null;
  if (accentoGrafico) {
    const accentoMatch = accentoGrafico.match(/([àèéòóùìɛɔ])/);
    if (accentoMatch) {
      const va = accentoMatch[1];
      const mappa = { 'à':'a','è':'ɛ','é':'e','ò':'ɔ','ó':'o','ù':'u','ì':'i','ɛ':'ɛ','ɔ':'ɔ' };
      const v = mappa[va] || va;
      const qualita = ['ɛ','ɔ'].includes(v) ? 'aperta' : ['e','o'].includes(v) ? 'chiusa' : 'normale';
      accento = { qualita, vocale: v, tipo: 'it-pr', grafico: va };
    }
  } else if (ipaStr) {
    // Fallback: solo se non abbiamo sillabazione, usa IPA per l'accento
    const tonicMatch = ipaStr.match(/ˈ[^aeiouɛɔ]*([aeiouɛɔ])/);
    if (tonicMatch) {
      const v = tonicMatch[1];
      const qualita = ['ɛ','ɔ'].includes(v) ? 'aperta' : ['e','o'].includes(v) ? 'chiusa' : 'normale';
      accento = { qualita, vocale: v, tipo: 'ipa', ipa_raw: ipaStr };
    }
  }

  return {
    word,
    ipa_raw: ipaStr || accentoGrafico || '',
    has_epsilon: hasEpsilon, has_open_o: hasOpenO,
    has_closed_e: hasClosedE, has_closed_o: hasClosedO,
    has_voiced_s: hasVoicedS, has_voiced_z: hasVoicedZ, has_voiceless_z: hasVoicelessZ,
    source: 'wiktionary',
    trovato: true, omografi: [], s_sonore: [],
    z_indici_sonori: hasVoicedZ ? [0] : [],
    accento,
    accentoGrafico, // conserva la forma it-pr per uso in elaboraParola
  };
}

// Mantieni compatibilità: wrapper che chiama parseWiktionaryResult
function parseWiktionaryIpa(ipaStr, word) {
  return parseWiktionaryResult({ tipo: 'ipa', valore: ipaStr }, word);
}

  const results = [];
  const needsInputAccento = []; // non trovate → chiedi accento
  const needsInputSZ = [];      // trovate ma s/z ambigua
  const needsInputEO = [];      // trovate ma qualità e/o ambigua
  const normalizza = w => w.normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  const haAccentoNonFinale = w => /[àèéìíîòóùúû][a-zA-Zàèéìíîòóùúûâêôûäëïöü]+/i.test(w);
  const haSZ = w => /[aeiou][sz][aeiou]/i.test(w);

  for (const word of words) {
    const clean = word.replace(/[^a-zA-Zàèéìíîòóùúûäëïöüâêôûœæ]/gi, '');
    if (!clean) continue;
    const cleanNorm = normalizza(clean);
    if (IATI_IU[cleanNorm] || PAROLE_ATONE.has(cleanNorm) || MONOSILLABI_FISSI[cleanNorm]) continue;

    if (haAccentoNonFinale(clean)) {
      // La parola ha già accento non finale: l'accento è dato, non cercare su Wiki
      // Ma se ha s/z intervocalica, cerca su Wiki solo per quello
      if (haSZ(cleanNorm)) {
        const risultato = await wiktionaryLookup(cleanNorm);
        if (risultato) {
          const infoSZ = parseWiktionaryResult(risultato, cleanNorm);
          if (infoSZ) {
            // Crea info sintetico: accento dall'utente (clean), s/z da Wiktionary
            const infoMerged = parseWiktionaryResult({ tipo: 'sill', valore: clean, ipa: null }, cleanNorm);
            if (infoMerged) {
              infoMerged.has_voiced_s = infoSZ.has_voiced_s;
              infoMerged.has_voiced_z = infoSZ.has_voiced_z;
              infoMerged.has_voiceless_z = infoSZ.has_voiceless_z;
              results.push(infoMerged);
              // s/z ancora ambigua?
              if (!infoSZ.has_voiced_s && !infoSZ.has_voiced_z && !infoSZ.has_voiceless_z) {
                needsInputSZ.push(cleanNorm);
              }
            }
          }
        } else {
          // Non trovata su Wiki: chiedi s/z all'utente
          needsInputSZ.push(cleanNorm);
        }
      }
      // Accento già noto, nessuna disambiguazione e/o necessaria
      continue;
    }

    // Parola senza accento: lookup completo
    const risultato = await wiktionaryLookup(cleanNorm);
    if (risultato) {
      const info = parseWiktionaryResult(risultato, cleanNorm);
      // Se trovata ma senza accento e non è monosillabo → chiedi all'utente
      // (es. Wiktionary dà redirect/disambiguazione, il parser non estrae nulla di utile)
      const vocaliInParola = (cleanNorm.match(/[aeiou]/gi) || []).length;
      const isMonosill = vocaliInParola <= 1;
      if (info && (info.accento !== null || isMonosill)) {
        results.push(info);
        // s/z ambigua
        if (!info.has_voiced_s && !info.has_voiced_z && !info.has_voiceless_z) {
          if (haSZ(cleanNorm)) needsInputSZ.push(cleanNorm);
        }
        // e/o ambigua: chiedi solo se né aperta né chiusa è indicata
        if (!info.has_epsilon && !info.has_open_o && !info.has_closed_e && !info.has_closed_o && info.accento) {
          const vt = info.accento.vocale;
          if (vt === 'e' || vt === 'o') needsInputEO.push(cleanNorm);
        }
      } else {
        // Trovata ma inutilizzabile: tratta come non trovata
        needsInputAccento.push({ word: cleanNorm, display: clean });
      }
    } else {
      if (cleanNorm.length > 1) {
        // Se la parola ha già accento finale, non serve disambiguare l'accento
        // Controlla solo se ha s/z intervocalica
        const haAccentoFinale = /[àèéòóùì]$/.test(clean);
        if (haAccentoFinale) {
          // Accento già noto — controlla solo s/z intervocalica
          if (/[aeiou][sz][aeiou]/i.test(cleanNorm)) needsInputSZ.push(cleanNorm);
          // Tratta come parola con accento utente
          if (!results.find(r => r.word === cleanNorm)) {
            const fake = parseWiktionaryResult({ tipo: 'sill', valore: clean, ipa: null }, cleanNorm);
            if (fake) results.push(fake);
          }
        } else {
          // Conta vocali sillabiche (escludi u di qu)
          // Accento di default sulla penultima vocale sillabica (piano)
          // L'utente può correggere tramite il campo testo se la parola è sdrucciola/ossitona
          const cleanPerPos = cleanNorm.replace(/qu/gi, 'q_');
          const posizioniVocali = [];
          for (let ki = 0; ki < cleanPerPos.length; ki++) {
            if (/[aeiou]/i.test(cleanPerPos[ki])) posizioniVocali.push(ki);
          }
          const mappaGrave = { 'a':'à','e':'è','i':'ì','o':'ò','u':'ù' };
          let formaPenult = cleanNorm;
          if (posizioniVocali.length >= 2) {
            const posPenult = posizioniVocali[posizioniVocali.length - 2];
            const vBase = cleanNorm[posPenult].toLowerCase();
            formaPenult = cleanNorm.slice(0, posPenult) + (mappaGrave[vBase] || vBase) + cleanNorm.slice(posPenult + 1);
          }
          const fake = parseWiktionaryResult({ tipo: 'sill', valore: formaPenult, ipa: null }, cleanNorm);
          if (fake) {
            results.push(fake);
            // Chiedi s/z se intervocalica
            if (haSZ(cleanNorm)) needsInputSZ.push(cleanNorm);
            // Chiedi qualità solo se vocale tonica è e o o
            if (fake.accento) {
              const vt = fake.accento.vocale;
              if (vt === 'e' || vt === 'o' || vt === 'ɛ' || vt === 'ɔ') needsInputEO.push(cleanNorm);
            }
            // Per trisillabi+: mostra campo testo per eventuale correzione posizione accento
            const vocaliSillabiche = posizioniVocali.length;
            if (vocaliSillabiche > 2) needsInputAccento.push({ word: cleanNorm, display: formaPenult });
          }
        }
      }
    }
  }
  return { results, needsInputAccento, needsInputSZ, needsInputEO };
}

// ═══════════════════════════════════════════════════════
// CONFRONTO TRASCRIZIONI
// ═══════════════════════════════════════════════════════
function normalizzaIpa(s) {
  return s
    .replace(/'/g, 'ˈ')   // apostrofo → accento primario IPA
    .replace(/:/g, 'ː')   // due punti → cronema IPA
    .replace(/[\[\]\s]/g, '')
    .trim();
}

function levenshtein(a, b) {
  const m = a.length, n = b.length;
  let dp = Array.from({length: n+1}, (_,i) => i);
  for (let i = 1; i <= m; i++) {
    const prev = [...dp]; dp[0] = i;
    for (let j = 1; j <= n; j++) {
      dp[j] = a[i-1]===b[j-1] ? prev[j-1] : 1+Math.min(prev[j], dp[j-1], prev[j-1]);
    }
  }
  return dp[n];
}

function confronta(studente, corretta) {
  const s = normalizzaIpa(studente), c = normalizzaIpa(corretta);
  if (s === c) return 'corretto';
  const dist = levenshtein(s, c);
  const ratio = dist / Math.max(s.length, c.length, 1);
  return ratio <= 0.10 ? 'parzialmente_corretto' : 'errato';
}

// STATO APP
// ═══════════════════════════════════════════════════════
let state = {
  page: 0,         // 0=home 1=loading 2=input_utente 3=trascrizione
  frase: '',
  customFrase: '',
  showCustom: false,
  esercizio: false, // se true: modalità scrivi+verifica; se false: soluzione immediata
  infoParole: [],
  needsInputAccento: [], // parole non trovate su Wiktionary
  needsInputSZ: [],      // parole con s/z intervocalica ambigua
  needsInputEO: [],      // parole con e/o tonica senza qualità indicata
  userChoices: {},  // word -> {v, sz}
  ipaValue: '',
  result: null,     // {trascrizione_corretta, esito, log_scontri}
  error: '',
  settings: { highlightStyle: 'background' },
  showSettings: false,
};

function setState(patch) { Object.assign(state, patch); render(); }

// ═══════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════
function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';
  if (state.page === 0) app.appendChild(renderHome());
  else if (state.page === 1) app.appendChild(renderLoading());
  else if (state.page === 2) app.appendChild(renderInput());
  else if (state.page === 3) app.appendChild(renderTrascrizione());
  // Bottone impostazioni sempre visibile
  app.appendChild(renderSettingsBtn());
  // Pannello impostazioni se aperto
  if (state.showSettings) document.body.appendChild(renderSettingsPanel());
}

// ─── INPUT UTENTE ────────────────────────────────────
function renderInput() {
  const div = el('div');

  // Frase
  const cardFrase = el('div','card');
  cardFrase.appendChild(lbl('Frase'));
  const ft = el('div','frase-text'); ft.textContent = state.frase;
  cardFrase.appendChild(ft);
  div.appendChild(cardFrase);

  const card = el('div','card');
  card.appendChild(lbl('Informazioni mancanti dal dizionario'));

  // ── SEZIONE ACCENTO ──────────────────────────────────
  if (state.needsInputAccento.length > 0) {
    const sec = el('div');
    sec.style.cssText = 'margin-bottom:1rem;';
    const secLbl = el('p');
    secLbl.style.cssText = 'font-family:var(--mono);font-size:0.7rem;color:var(--muted);margin-bottom:0.5rem;text-transform:uppercase;letter-spacing:0.08em;';
    secLbl.innerHTML = 'Correggi la posizione dell\'accento se la parola non è piana (accento già messo sulla penultima di default).';
    sec.appendChild(secLbl);

    // Tastierina accenti
    const kbRow = el('div');
    kbRow.style.cssText = 'display:flex;flex-wrap:wrap;gap:0.3rem;margin-bottom:0.75rem;';
    ['à','è','é','ì','ò','ó','ù'].forEach(sym => {
      const k = el('button','ipa-key');
      k.textContent = sym;
      k.style.fontSize = '0.85rem';
      k.onmousedown = (e) => e.preventDefault(); // mantiene focus sull'input
      k.onclick = () => {
        const active = document.activeElement;
        if (active && active.dataset.word) {
          const w = active.dataset.word;
          const cur = active.value || '';
          const st = active.selectionStart != null ? active.selectionStart : cur.length;
          const en = active.selectionEnd != null ? active.selectionEnd : cur.length;
          const nuovo = cur.slice(0,st) + sym + cur.slice(en);
          active.value = nuovo;
          if (!state.userChoices[w]) state.userChoices[w] = {};
          state.userChoices[w].testo = nuovo;
          setTimeout(() => { active.selectionStart = active.selectionEnd = st + sym.length; active.focus(); }, 0);
        }
      };
      kbRow.appendChild(k);
    });
    sec.appendChild(kbRow);

    state.needsInputAccento.forEach(entry => {
      const word = typeof entry === 'object' ? entry.word : entry;
      const display = typeof entry === 'object' ? entry.display : entry;
      const ch = state.userChoices[word] || {};
      const block = el('div','word-input-block');
      const wl = el('div','word-label'); wl.textContent = display;
      block.appendChild(wl);
      const inp = el('input','text-input');
      inp.type = 'text';
      inp.placeholder = display;
      inp.value = ch.testo || display;
      inp.dataset.word = word;
      inp.style.cssText = 'margin-bottom:0.5rem;font-style:italic;';
      inp.oninput = e => {
        if (!state.userChoices[word]) state.userChoices[word] = {};
        state.userChoices[word].testo = e.target.value;
      };
      block.appendChild(inp);
      sec.appendChild(block);
    });
    card.appendChild(sec);
  }

  // ── SEZIONE S/Z ──────────────────────────────────────
  if (state.needsInputSZ.length > 0) {
    const sec = el('div');
    sec.style.cssText = 'margin-bottom:1rem;';
    const secLbl = el('p');
    secLbl.style.cssText = 'font-family:var(--mono);font-size:0.7rem;color:var(--muted);margin-bottom:0.5rem;text-transform:uppercase;letter-spacing:0.08em;';
    secLbl.textContent = 's/z intervocalica';
    sec.appendChild(secLbl);
    state.needsInputSZ.forEach(word => {
      const ch = state.userChoices[word] || {};
      const block = el('div','word-input-block');
      const wl = el('div','word-label'); wl.textContent = word;
      block.appendChild(wl);
      const row = el('div','choice-row');
      [['s','s sorda'],['z','z sonora'],['ts','ts'],['dz','dz']].forEach(([val,lab]) => {
        const b = el('button','cbtn' + (ch.sz===val?' sel':''));
        b.textContent = lab;
        b.onclick = () => { const cur = (state.userChoices[word]||{}).sz; setChoice(word,'sz', cur===val ? null : val); };
        row.appendChild(b);
      });
      block.appendChild(row);
      sec.appendChild(block);
    });
    card.appendChild(sec);
  }

  // ── SEZIONE E/O ───────────────────────────────────────
  if (state.needsInputEO.length > 0) {
    const sec = el('div');
    sec.style.cssText = 'margin-bottom:1rem;';
    const secLbl = el('p');
    secLbl.style.cssText = 'font-family:var(--mono);font-size:0.7rem;color:var(--muted);margin-bottom:0.5rem;text-transform:uppercase;letter-spacing:0.08em;';
    secLbl.textContent = 'qualità della vocale tonica';
    sec.appendChild(secLbl);
    state.needsInputEO.forEach(word => {
      const ch = state.userChoices[word] || {};
      // Trova la vocale tonica dalla cache (o dalla forma auto-accentata)
      const infoWord = state.infoParole.find(i => i.word === word);
      const vTonica = infoWord && infoWord.accento ? infoWord.accento.vocale : null;
      const isE = !vTonica || vTonica === 'e' || vTonica === 'ɛ';
      const isO = !vTonica || vTonica === 'o' || vTonica === 'ɔ';
      const block = el('div','word-input-block');
      const wl = el('div','word-label'); wl.textContent = word;
      block.appendChild(wl);
      const row = el('div','choice-row');
      // Mostra solo i bottoni pertinenti alla vocale tonica
      const opzioni = [];
      if (isE) opzioni.push(['e','e chiusa'], ['ɛ','ɛ aperta']);
      if (isO) opzioni.push(['o','o chiusa'], ['ɔ','ɔ aperta']);
      opzioni.forEach(([val,lab]) => {
        const b = el('button','cbtn' + (ch.v===val?' sel':''));
        b.textContent = lab;
        b.onclick = () => { const cur = (state.userChoices[word]||{}).v; setChoice(word,'v', cur===val ? null : val); };
        row.appendChild(b);
      });
      block.appendChild(row);
      sec.appendChild(block);
    });
    card.appendChild(sec);
  }

  const btnProcedi = btn('Prosegui →', true);
  btnProcedi.style.marginTop = '1rem';
  btnProcedi.onclick = () => {
    if (!state.esercizio) {
      // Modalità soluzione: calcola subito
      const wf = getEffectiveWiktFn();
      const res = trascrivi(state.frase, wf);
      if (res.richiesta_utente) {
        setState({ error: res.messaggio, page: 0 });
      } else {
        setState({ page: 3, ipaValue: '', result: { trascrizione_corretta: res.trascrizione, esito: 'corretto', log_scontri: res.log_scontri, log_sinalefe: res.log_sinalefe, soloSol: true } });
      }
    } else {
      setState({ page: 3, ipaValue: '', result: null });
    }
  };
  card.appendChild(btnProcedi);
  div.appendChild(card);

  const btnBack = btn('← Ricomincia');
  btnBack.onclick = reset;
  div.appendChild(btnBack);
  return div;
}

// ─── TRASCRIZIONE ────────────────────────────────────
function renderTrascrizione() {
  const div = el('div');

  // Frase — editabile in qualunque momento
  const cardFrase = el('div','card');
  cardFrase.appendChild(lbl('Frase da trascrivere'));

  const fraseRow = el('div');
  fraseRow.style.cssText = 'display:flex;gap:0.5rem;align-items:center;flex-wrap:wrap;';
  const fraseInp = el('input','text-input');
  fraseInp.type = 'text';
  fraseInp.id = 'frase-edit';
  fraseInp.value = state.frase;
  fraseInp.style.cssText = 'flex:1;min-width:0;margin-bottom:0;font-size:1.2rem;';
  fraseInp.oninput = e => { state.frase = e.target.value; };
  fraseInp.onkeydown = e => {
    if (e.key === 'Enter' && state.frase.trim()) {
      e.preventDefault();
      startLookup(state.frase.trim());
    }
  };
  const btnRicarica = btn('↺');
  btnRicarica.title = 'Usa questa frase';
  btnRicarica.onclick = () => { if (state.frase.trim()) startLookup(state.frase.trim()); };
  fraseRow.appendChild(fraseInp);
  fraseRow.appendChild(btnRicarica);
  cardFrase.appendChild(fraseRow);

  const noteItems = buildNoteItems();
  if (noteItems.length) {
    const note = el('div','frase-note');
    noteItems.forEach(({word,src,pp}) => {
      const sp = el('span');
      sp.style.marginRight = '0.75rem';
      const em = el('em'); em.textContent = word; sp.appendChild(em);
      const badge = el('span', 'src src-' + src); badge.textContent = src; sp.appendChild(badge);
      sp.appendChild(txt(': ' + pp.join(', ')));
      note.appendChild(sp);
    });
    cardFrase.appendChild(note);
  }
  div.appendChild(cardFrase);

  // Textarea e bottoni verifica — solo in modalità esercizio
  if (state.esercizio) {
    const ta = document.createElement('textarea');
    ta.id = 'ipa-input';
    ta.placeholder = 'Scrivi qui la tua trascrizione IPA…';
    ta.spellcheck = false;
    ta.value = state.ipaValue;
    ta.oninput = e => { state.ipaValue = e.target.value; };
    ta.onkeydown = e => {
      if (e.key === 'Enter' && !e.shiftKey && state.ipaValue.trim()) {
        e.preventDefault();
        verifica();
      }
    };
    div.appendChild(ta);

    const row = el('div','btn-row');
    const btnVerifica = btn('Verifica', true);
    btnVerifica.disabled = !state.ipaValue.trim();
    btnVerifica.onclick = () => verifica();
    const btnSol = btn('Mostra soluzione');
    btnSol.onclick = () => mostraSoluzione();
    const btnNuova = btn('Nuova frase');
    btnNuova.onclick = reset;
    row.appendChild(btnVerifica); row.appendChild(btnSol); row.appendChild(btnNuova);
    div.appendChild(row);
  } else {
    // Modalità soluzione: solo bottone nuova frase
    const row = el('div','btn-row');
    const btnNuova = btn('Nuova frase');
    btnNuova.onclick = reset;
    row.appendChild(btnNuova);
    div.appendChild(row);
  }

  // Risultato
  if (state.result) {
    div.appendChild(renderRisultato());
  }

  // Tastiera IPA — solo in modalità esercizio
  if (state.esercizio) {
    const kb = el('div','ipa-kb');
    kb.style.marginTop = '1.5rem';
    kb.style.borderTop = '1px solid var(--border)';
    kb.style.paddingTop = '1rem';
    Object.entries(IPA_SYMS).forEach(([group,syms]) => {
      const g = el('div','ipa-group');
      const gl = el('span','ipa-group-label'); gl.textContent = group; g.appendChild(gl);
      const keys = el('div','ipa-keys');
      syms.forEach(sym => {
        const k = el('button','ipa-key'); k.textContent = sym;
        k.onclick = () => insertSym(sym);
        keys.appendChild(k);
      });
      g.appendChild(keys); kb.appendChild(g);
    });
    div.appendChild(kb);
  }

  return div;
}


// ─── HELPER: renderizza trascrizione per sillabe ──────────────────────────
function renderTrascrizioneSillabe(trascrizione, logScontri, logSinalefe) {
  const inner = trascrizione.replace(/^\[|\]$/g, '');
  const parts = inner.split('.');
  const spans = [];
  const open = document.createElement('span');
  open.textContent = '[';
  spans.push(open);
  parts.forEach((part, i) => {
    const s = document.createElement('span');
    s.className = 'syl-span';
    s.dataset.syl = i;
    s.textContent = (i > 0 ? '.' : '') + part;
    // Hover sulla trascrizione → evidenzia voci di log con questo sylIdx
    const allLog = [...(logScontri||[]), ...(logSinalefe||[])];
    const matching = allLog.filter(e => typeof e === 'object' && e.sylIdx === i);
    if (matching.length) {
      s.style.cursor = 'pointer';
      s.onmouseenter = () => {
        matching.forEach(entry => {
          let target = null;
          if (entry.logId !== undefined) {
            target = document.querySelector(`.log-item[data-logid="${entry.logId}"]`);
          }
          if (!target) {
            const items = document.querySelectorAll('.log-item');
            items.forEach(d => { if (d.textContent === entry.testo && !target) target = d; });
          }
          if (target) { target.style.background = '#fff3cd'; target.style.borderRadius = '3px'; }
        });
      };
      s.onmouseleave = () => {
        document.querySelectorAll('.log-item').forEach(d => {
          d.style.background = '';
          d.style.borderRadius = '';
        });
      };
    }
    spans.push(s);
  });
  const close = document.createElement('span');
  close.textContent = ']';
  spans.push(close);
  return spans;
}

// ─── HELPER: attach hover su voce di log ─────────────────────────────────
function attachLogHover(domEl, sylStart, sylEnd) {
  const getStyle = () => {
    const s = (state.settings && state.settings.highlightStyle) || 'background';
    if (s === 'background') return { background: '#ff6b00', color: '#fff', borderRadius: '2px', padding: '0 2px' };
    if (s === 'border')     return { outline: '3px solid #ff6b00', borderRadius: '2px' };
    if (s === 'color')      return { color: '#d00000', fontWeight: 'bold' };
    return { background: '#ff6b00', color: '#fff' };
  };

  domEl.style.cursor = 'pointer';

  domEl.onmouseenter = () => {
    // Feedback visivo sulla voce stessa
    domEl.style.background = '#f0f4ff';
    domEl.style.borderRadius = '3px';
    // Evidenzia sillaba solo se sylIdx >= 0
    if (sylStart < 0) return;
    const code = document.getElementById('ipa-result-code');
    if (!code) return;
    const style = getStyle();
    for (let i = sylStart; i <= sylEnd; i++) {
      const sp = code.querySelector(`[data-syl="${i}"]`);
      if (sp) Object.assign(sp.style, style);
    }
  };
  domEl.onmouseleave = () => {
    domEl.style.background = '';
    domEl.style.borderRadius = '';
    const code = document.getElementById('ipa-result-code');
    if (!code) return;
    code.querySelectorAll('.syl-span').forEach(sp => {
      sp.style.background = '';
      sp.style.color = '';
      sp.style.fontWeight = '';
      sp.style.outline = '';
      sp.style.borderRadius = '';
      sp.style.padding = '';
    });
  };
}

// Allinea due stringhe per il confronto visivo (Levenshtein backtracking)
function allineaStringhe(a, b) {
  const m = a.length, n = b.length;
  // Costruisci matrice DP
  const dp = Array.from({length: m+1}, (_, i) => Array.from({length: n+1}, (_, j) => i === 0 ? j : j === 0 ? i : 0));
  for (let i = 1; i <= m; i++)
    for (let j = 1; j <= n; j++)
      dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1] : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);

  // Backtrack
  const allineamento = [];
  let i = m, j = n;
  while (i > 0 || j > 0) {
    if (i > 0 && j > 0 && a[i-1] === b[j-1]) {
      allineamento.unshift([a[i-1], b[j-1]]); i--; j--;
    } else if (j > 0 && (i === 0 || dp[i][j-1] <= dp[i-1][j] && dp[i][j-1] <= dp[i-1][j-1])) {
      allineamento.unshift([null, b[j-1]]); j--;  // inserzione
    } else if (i > 0 && (j === 0 || dp[i-1][j] <= dp[i][j-1] && dp[i-1][j] <= dp[i-1][j-1])) {
      allineamento.unshift([a[i-1], null]); i--;  // cancellazione
    } else {
      allineamento.unshift([a[i-1], b[j-1]]); i--; j--;  // sostituzione
    }
  }
  return allineamento;
}

// AZIONI

async function startLookup(frase) {
  setState({ frase, page: 1, error: '', result: null, ipaValue: '', userChoices: {} });
  const { results, needsInputAccento, needsInputSZ, needsInputEO } = await doLookup(frase);
  setState({ infoParole: results, needsInputAccento, needsInputSZ, needsInputEO });
  if (needsInputAccento.length > 0 || needsInputSZ.length > 0 || needsInputEO.length > 0) {
    setState({ page: 2 });
  } else if (state.esercizio) {
    setState({ page: 3 });
  } else {
    // Modalità soluzione immediata: mostra direttamente la trascrizione
    const wf = getEffectiveWiktFn();
    const res = trascrivi(frase, wf);
    if (res.richiesta_utente) {
      setState({ error: res.messaggio, page: 0 });
    } else {
      setState({ page: 3, result: { trascrizione_corretta: res.trascrizione, esito: 'corretto', log_scontri: res.log_scontri, log_sinalefe: res.log_sinalefe, soloSol: true } });
    }
  }
}

function setChoice(word, key, val) {
  const prev = state.userChoices[word] || {};
  const updated = {...prev};
  if (val === null) delete updated[key]; else updated[key] = val;
  state.userChoices = {...state.userChoices, [word]: updated};
  render();
}

function getEffectiveWiktFn() {
  const map = {};
  state.infoParole.forEach(info => { map[info.word] = info; });
  return function(parola) {
    const p = parola.toLowerCase().trim();
    // Normalizza rimuovendo accenti per la ricerca nella cache
    // (es. 'hò' deve trovare 'ho', 'fà' deve trovare 'fa', ecc.)
    const pNorm = p.normalize('NFD').replace(/[\u0300-\u036f]/g, '');
    const ch = state.userChoices[p] || state.userChoices[pNorm] || {};

    // Parola trovata su Wiktionary
    if (map[p] || map[pNorm]) {
      const mapKey = map[p] ? p : pNorm;
      const info = Object.assign({}, map[mapKey]);
      // Integra s/z scelta dall'utente (needsInputSZ)
      if (ch.sz) {
        info.has_voiced_s = ch.sz === 'z';
        info.has_voiced_z = ch.sz === 'dz';
        info.has_voiceless_z = ch.sz === 'ts';
      }
      // Integra qualità e/o scelta dall'utente (needsInputEO)
      if (ch.v) {
        info.has_epsilon  = ch.v === 'ɛ';
        info.has_open_o   = ch.v === 'ɔ';
        info.has_closed_e = ch.v === 'e';
        info.has_closed_o = ch.v === 'o';
        // Aggiorna accentoGrafico con il timbro corretto
        if (info.accentoGrafico) {
          const mappaV = { 'ɛ':'è', 'e':'é', 'ɔ':'ò', 'o':'ó' };
          const nuovo = mappaV[ch.v];
          if (nuovo) {
            // Sostituisce é↔è o ó↔ò nell'accentoGrafico
            info.accentoGrafico = info.accentoGrafico.replace(/[èé]/g, nuovo.includes('e') ? nuovo : '$&')
                                                      .replace(/[òó]/g, nuovo.includes('o') ? nuovo : '$&');
          }
        }
        if (info.accento) {
          const qualita = (ch.v === 'ɛ' || ch.v === 'ɔ') ? 'aperta' : 'chiusa';
          info.accento = Object.assign({}, info.accento, { vocale: ch.v, qualita });
        }
      }
      return info;
    }

    // Parola non trovata: l'utente ha fornito il testo accentato (needsInputAccento)
    // Se l'utente non ha modificato il campo (o lo ha lasciato uguale alla forma base),
    // applica accento di default sulla penultima vocale (piano)
    {
      const testoUtente = (ch.testo || '').trim();
      const haAccentoNonFinale = /[àèéòóùì][a-zàèéòóùì]/i.test(testoUtente);
      let testoFinale = testoUtente;
      if (testoUtente && !haAccentoNonFinale) {
        // Nessun accento non-finale inserito: metti accento grave sulla penultima vocale
        const vocaliRe = /[aeiou]/gi;
        const posizioni = [];
        let m;
        while ((m = vocaliRe.exec(testoUtente)) !== null) posizioni.push(m.index);
        if (posizioni.length >= 2) {
          const posPenult = posizioni[posizioni.length - 2];
          const mappaGrave = { 'a':'à','e':'è','i':'ì','o':'ò','u':'ù' };
          const vOrig = testoUtente[posPenult].toLowerCase();
          const vAcc = mappaGrave[vOrig] || vOrig;
          testoFinale = testoUtente.slice(0, posPenult) + vAcc + testoUtente.slice(posPenult + 1);
        }
      }
      // Integra qualità e/o scelta dall'utente per parole non trovate su Wiktionary
      if (testoFinale) {
        const base = parseWiktionaryResult({ tipo: 'sill', valore: testoFinale, ipa: null }, p);
        if (base) {
          if (ch.v) {
            base.has_epsilon  = ch.v === 'ɛ';
            base.has_open_o   = ch.v === 'ɔ';
            base.has_closed_e = ch.v === 'e';
            base.has_closed_o = ch.v === 'o';
            // Aggiorna accentoGrafico con il timbro scelto
            if (base.accentoGrafico) {
              const mappaV = { 'ɛ':'è', 'e':'é', 'ɔ':'ò', 'o':'ó' };
              const nuovo = mappaV[ch.v];
              if (nuovo) {
                base.accentoGrafico = base.accentoGrafico
                  .replace(/[èé]/g, nuovo.includes('e') ? nuovo : '$&')
                  .replace(/[òó]/g, nuovo.includes('o') ? nuovo : '$&');
              }
            }
            if (base.accento) {
              const qualita = (ch.v === 'ɛ' || ch.v === 'ɔ') ? 'aperta' : 'chiusa';
              base.accento = Object.assign({}, base.accento, { vocale: ch.v, qualita });
            }
          }
          return base;
        }
      }
    }

    // Fallback: nessuna info
    return {
      trovato: true, omografi: [], s_sonore: [],
      z_indici_sonori: [],
      accento: null, accentoGrafico: null,
      has_voiced_s: false, has_voiced_z: false,
      has_voiceless_z: false, has_epsilon: false,
      has_open_o: false, source: 'utente',
    };
  };
}

function verifica() {
  const wf = getEffectiveWiktFn();
  const res = trascrivi(state.frase, wf);
  if (res.richiesta_utente) { setState({ error: res.messaggio }); return; }
  const esito = confronta(state.ipaValue, res.trascrizione);
  setState({ result: { trascrizione_corretta: res.trascrizione, esito, log_scontri: res.log_scontri, log_sinalefe: res.log_sinalefe, soloSol: false } });
}

function mostraSoluzione() {
  const wf = getEffectiveWiktFn();
  const res = trascrivi(state.frase, wf);
  if (res.richiesta_utente) { setState({ error: res.messaggio }); return; }
  setState({ result: { trascrizione_corretta: res.trascrizione, esito: 'corretto', log_scontri: res.log_scontri, log_sinalefe: res.log_sinalefe, soloSol: true } });
}

function reset() {
  const esercizio = state.esercizio;
  state = { page:0, frase:'', customFrase:'', esercizio, infoParole:[], needsInputAccento:[], needsInputSZ:[], needsInputEO:[], userChoices:{}, ipaValue:'', result:null, error:'' };
  render();
}

function insertSym(sym) {
  const ta = document.getElementById('ipa-input');
  if (!ta) return;
  const st = ta.selectionStart, en = ta.selectionEnd;
  const newVal = state.ipaValue.slice(0,st) + sym + state.ipaValue.slice(en);
  state.ipaValue = newVal;
  render();
  setTimeout(() => {
    const t = document.getElementById('ipa-input');
    if (t) { t.selectionStart = t.selectionEnd = st + sym.length; t.focus(); }
  }, 0);
}

function buildNoteItems() {
  const items = [];
  state.infoParole.forEach(info => {
    const pp = [];
    if (info.has_epsilon) pp.push('e→ɛ');
    if (info.has_open_o) pp.push('o→ɔ');
    if (info.has_voiced_s) pp.push('s→z');
    if (info.has_voiced_z) pp.push('z→dz');
    if (info.has_voiceless_z) pp.push('z→ts');
    if (pp.length) items.push({ word: info.word, src: 'wiktionary', pp });
  });
  Object.entries(state.userChoices).forEach(([w,ch]) => {
    const pp = [];
    if (ch.testo || ch.sz || ch.v) {
      const pp = [];
      if (ch.testo) pp.push(ch.testo);
      if (ch.sz) pp.push(`sz→${ch.sz}`);
      if (pp.length) items.push({ word: w, src: 'utente', pp });
    }
  });
  return items;
}

const VOCALI = new Set('aeiouàèéòóùìɛɔ');
const VOCALI_ACCENTATE = new Set('àèéòóùì');
const VOCALI_ATONE = new Set('aeiouɛɔ');
const CONSONANTI_SONORE = new Set('bdgvlmnr');
const AFFRICATE_DOPPIE = ['ttʃ','ddʒ','tts','ddz'];
const AFFRICATE_SCEMPIE = ['tʃ','dʒ','ts','dz'];

// Parole grammaticali sempre atone — non ricevono mai accento da Wiktionary
const PAROLE_ATONE = new Set([
  'che','se','e','a','su','i','il','lo','la','gli','le','un','uno','una',
  'di','da','in','con','per','tra','fra','al','del','nel','col','sul',
  'mi','ti','si','ci','vi','lo','la','li','le','ne','gli',
  'non','ma','però','anche','già','più','meno','molto','poco',
]);

const LISTA_ACUTO = new Set(['sé','né','perché','affinché','benché','poiché','giacché','finché','sicché','poté']);
// Monosillabi con forma traslitterata fissa (bypassano Wiktionary e forzaAccento)
// Chiave: forma ortografica base; valore: forma già pronta per la traslitterazione
const MONOSILLABI_FISSI = {
  'ho': 'ò',   // ausiliare avere → [ɔ] tonico, attiva RF
  'ha': 'à',   // ausiliare avere → [a] tonico, attiva RF
  'do': 'dò',  // verbo dare → [ɔ] tonico, attiva RF
  'fa': 'fà',  // verbo fare → [a] tonico, attiva RF
  'sta': 'stà',// verbo stare → [a] tonico, attiva RF
  'va': 'và',  // verbo andare → [a] tonico, attiva RF
  'sa': 'sà',  // verbo sapere → [a] tonico, attiva RF
};
// Parole attivanti nella forma TRASLITTERATA
// che→ke, qualche→kwàlke, ho→ò, ha→à (tonica, diversa da a preposizione)
// hai/i esclusi: finali troppo comuni in altre parole
const PAROLE_ATTIVANTI = new Set(['kwàlke','ke','e','se','a','su','ò','à','fà','và','sà','stà']);
const PAROLE_RADDOPPIO_INIZIALE = new Set(['dio','dea','dei','dee']);
const LETTERE_ALFABETO = {A:'à',B:'bbì',C:'ccì',D:'ddì',E:'è',F:'èffe',G:'ggì',H:'àcca',I:'ì',J:'ggèi',K:'kàppa',L:'èlle',M:'èmme',N:'ènne',O:'ò',P:'ppì',Q:'ccù',R:'èrre',S:'èsse',T:'ttì',U:'ù',V:'vvì',W:'dòppjavvì',X:'ìks',Y:'ìpsilon',Z:'zzèta'};

function isVocale(c) { return VOCALI.has(c); }
function isConsonante(c) { return c && !VOCALI.has(c) && !['|','$','.','\'','ˌ','ˈ'].includes(c); }
function isVocaleAccentata(c) { return VOCALI_ACCENTATE.has(c); }

function tokenizza(testo) {
  const matches = testo.match(/[.,;:!?]|[^\s.,;:!?]+/g) || [];
  return matches;
}

function contaVocaliAccentateNonFinali(parola) {
  let count = 0;
  for (let i = 0; i < parola.length-1; i++) {
    if (VOCALI_ACCENTATE.has(parola[i])) count++;
  }
  return count;
}

function haVocaleAccentataNoFinale(parola) {
  for (let i = 0; i < parola.length-1; i++) {
    if (VOCALI_ACCENTATE.has(parola[i])) return true;
  }
  return false;
}

function isMonosillabo(parola) {
  // Salta la u di qu e le semivocali u/i prevocaliche
  const p = parola.replace(/qu/gi, 'q_');
  const chars = [...p];
  let nuclei = 0;
  for (let k = 0; k < chars.length; k++) {
    if (VOCALI.has(chars[k])) {
      // u/i non accentate seguite da vocale = semivocale, non conta come nucleo
      const seguente = chars[k+1] || '';
      if ('ui'.includes(chars[k]) && VOCALI.has(seguente)) continue;
      nuclei++;
    }
  }
  return nuclei === 1;
}

function forzaAccento(parola) {
  const pl = parola.toLowerCase().replace(/[.,;:!?]/g,'');
  if (LISTA_ACUTO.has(pl)) {
    return parola.replace(/[eè]/i, 'é');
  } else {
    return parola.replace(/é/g,'è').replace(/ó/g,'ò');
  }
}

function traslittera(p) {
  const VOCALI_PIENE = 'aàeèéoòóuù';
  const seguitoDaVocalePiena = (s, pos, len) => {
    const idx = pos + len;
    return idx < s.length && VOCALI_PIENE.includes(s[idx]);
  };

  // Funzione ausiliaria per sostituzione iterativa
  function sostituisci(p, rules) {
    let result = '';
    let i = 0;
    while (i < p.length) {
      let matched = false;
      for (const [from, to, cond] of rules) {
        if (p.slice(i, i+from.length) === from) {
          if (!cond || cond(p, i, from.length)) {
            result += to;
            i += from.length;
            matched = true;
            break;
          }
        }
      }
      if (!matched) { result += p[i]; i++; }
    }
    return result;
  }

  // sc
  p = sostituisci(p, [
    ['sci', 'ʃ', (s,i,l) => seguitoDaVocalePiena(s,i,l)],
    ['scì', 'ʃì'],
    ['sci', 'ʃi'],
    ['sce', 'ʃe'],
    ['scé', 'ʃé'],
    ['scè', 'ʃè'],
  ]);
  // cci
  p = sostituisci(p, [
    ['cci', 'ttʃ', (s,i,l) => seguitoDaVocalePiena(s,i,l)],
    ['cci', 'ttʃi'],
    ['ccì', 'ttʃì'],
    ['cce', 'ttʃe'],
    ['ccè', 'ttʃè'],
    ['ccé', 'ttʃé'],
  ]);
  // ci
  p = sostituisci(p, [
    ['ci', 'tʃ', (s,i,l) => seguitoDaVocalePiena(s,i,l)],
    ['ci', 'tʃi'],
    ['cì', 'tʃì'],
    ['ce', 'tʃe'],
    ['cè', 'tʃè'],
    ['cé', 'tʃé'],
  ]);
  // c -> k
  p = p.replace(/c/g,'k').replace(/C/g,'K');
  // sh -> ʃ (parole straniere: shaker, show, ecc.)
  p = p.replace(/sh/g,'ʃ');
  // gli
  p = sostituisci(p, [
    ['gli', 'ʎ', (s,i,l) => seguitoDaVocalePiena(s,i,l)],
    ['glì', 'ʎì'],
    ['gli', 'ʎi'],
  ]);
  // ggi
  p = sostituisci(p, [
    ['ggi', 'ddʒ', (s,i,l) => seguitoDaVocalePiena(s,i,l)],
    ['ggì', 'ddʒì'],
    ['ggi', 'ddʒi'],
    ['gge', 'ddʒe'],
    ['ggè', 'ddʒè'],
    ['ggé', 'ddʒé'],
  ]);
  // gi
  p = sostituisci(p, [
    ['gi', 'dʒ', (s,i,l) => seguitoDaVocalePiena(s,i,l)],
    ['gì', 'dʒì'],
    ['gi', 'dʒi'],
    ['ge', 'dʒe'],
    ['gè', 'dʒè'],
    ['gé', 'dʒé'],
  ]);
  // gn
  p = sostituisci(p, [
    ['gni', 'ɲ', (s,i,l) => seguitoDaVocalePiena(s,i,l)],
    ['gn', 'ɲ'],
  ]);
  // ġ -> g
  p = p.replace(/ġ/g,'g').replace(/Ġ/g,'G');
  // h -> ''
  p = p.replace(/h/g,'').replace(/H/g,'');
  // qu → kw (prima di q→k, altrimenti u rimane e non diventa semivocale)
  p = p.replace(/qu/g, 'kw').replace(/Qu/g, 'Kw').replace(/QU/g, 'KW');
  // q → k (per eventuali q rimaste)
  p = p.replace(/q/g,'k').replace(/Q/g,'K');
  // ṣ -> z
  p = p.replace(/ṣ/g,'z');

  return p;
}

function raddoppiaFinalePrestiti(parola) {
  if (parola.length < 2) return parola;
  const ultima = parola[parola.length-1];
  const penultima = parola[parola.length-2];
  if (!'lmnr'.includes(ultima) && !VOCALI.has(ultima) && VOCALI.has(penultima)) {
    return parola + ultima;
  }
  return parola;
}

function elaboraParola(parola, wiktFn) {
  // Lettera alfabeto isolata (maiuscola singola)
  if (LETTERE_ALFABETO[parola]) {
    return { frammento: LETTERE_ALFABETO[parola] + '$', richiesta: false };
  }

  // Converti in minuscolo (salvo segnaccenti già presenti)
  parola = parola.toLowerCase();

  // ─── Controllo iati i/u ───────────────────────────────────────────
  // Va fatto subito, prima di Wiktionary e dell'inserimento dell'accento,
  // altrimenti la chiave non matcha (es. "poeta" diventa "poèta" dopo Wiktionary)
  const _lemmaKey = parola.replace(/[^a-zà-ùɛɔ]/gi, '').toLowerCase();

  // ─── Monosillabi fissi ────────────────────────────────────────────
  if (MONOSILLABI_FISSI[_lemmaKey]) {
    parola = MONOSILLABI_FISSI[_lemmaKey];
    parola = traslittera(parola);
    return { frammento: parola + '$', richiesta: false };
  }

  if (IATI_IU[_lemmaKey]) {
    parola = IATI_IU[_lemmaKey];
    // Salta Wiktionary: vai direttamente a traslitterazione
    parola = traslittera(parola);
    parola = raddoppiaFinalePrestiti(parola);
    return { frammento: parola + '$', richiesta: false };
  } else if (IATI_AMBIGUI[_lemmaKey]) {
    return { frammento: parola, richiesta: true,
      msg: `La parola "${parola}" ha doppia lettura: ${IATI_AMBIGUI[_lemmaKey].opzioni.join(' / ')}. Quale intendi?` };
  }

  if (contaVocaliAccentateNonFinali(parola) > 1) {
    return { frammento: parola, richiesta: true, msg: `La parola "${parola}" ha più di un segnaccento. Riscrivila con uno solo.` };
  }

  let haSegnaccento = haVocaleAccentataNoFinale(parola);

  if (isMonosillabo(parola)) {
    parola = forzaAccento(parola);
  }

  // Wiktionary lookup
  const ris = wiktFn(parola.toLowerCase().replace(/[^a-zà-ùɛɔ]/gi,''));

  if (!ris.trovato) {
    return { frammento: parola, richiesta: true, msg: `La parola "${parola}" non è stata trovata. Fornisci la trascrizione manualmente.` };
  }

  // Applica s/z da Wiktionary
  if (ris.has_voiced_s) {
    parola = parola.replace(/(?<=[aeiouàèéòóùì])s(?=[aeiouàèéòóùì])/g, 'ṣ');
  }
  parola = parola.replace(/z/g, ris.has_voiced_z ? 'dz' : 'ts');

  // Accento da Wiktionary — salta per parole grammaticali atone
  const parolaBase = parola.replace(/[^a-zà-ùɛɔ]/gi,'');
  if (!haSegnaccento && ris.accento && !PAROLE_ATONE.has(parolaBase)) {
    const acc = ris.accento;

    if (acc.tipo === 'it-pr' && ris.accentoGrafico) {
      const formaItPr = ris.accentoGrafico.toLowerCase();
      const mappa = {'à':'a','è':'e','é':'e','ò':'o','ó':'o','ù':'u','ì':'i'};
      // Trova la vocale accentata nella forma it-pr e il suo indice tra le vocali
      // Salta la u di qu (non è vocale sillabica), come facciamo nella parola ortografica
      const formaItPrPerConteggio = formaItPr.replace(/qu/g, 'q_');
      let indiceVocaleItPr = 0; // quante vocali sono venute prima nella forma it-pr
      let vaItPr = null;
      const tutteVocali = 'aeiouàèéòóùì';
      for (let k = 0; k < formaItPrPerConteggio.length; k++) {
        if (mappa[formaItPrPerConteggio[k]]) { vaItPr = formaItPrPerConteggio[k]; break; }
        if (tutteVocali.includes(formaItPrPerConteggio[k])) indiceVocaleItPr++;
      }
      if (vaItPr !== null) {
        const mappaAccento = {'à':'à','è':'è','é':'é','ò':'ò','ó':'ó','ù':'ù','ì':'ì',
          'a':'à','e':'è','o':'ò','i':'ì','u':'ù'};
        const vAccentata = vaItPr in {'à':1,'è':1,'é':1,'ò':1,'ó':1,'ù':1,'ì':1} ?
          vaItPr : mappaAccento[mappa[vaItPr]] || mappa[vaItPr];
        const vBase = mappa[vaItPr] || vaItPr;
        // Trova la vocale all'indice corretto nella parola ortografica
        // saltando la u di qu (non è vocale sillabica)
        const parolaPerConteggio = parola.replace(/qu/gi, 'q_');
        let conta = 0, posTonica = -1;
        for (let k = 0; k < parolaPerConteggio.length; k++) {
          if ('aeiou'.includes(parolaPerConteggio[k])) {
            if (conta === indiceVocaleItPr) { posTonica = k; break; }
            conta++;
          }
        }
        if (posTonica >= 0) {
          parola = parola.slice(0, posTonica) + vAccentata + parola.slice(posTonica + 1);
        } else {
          // Fallback: sostituisci prima occorrenza
          const re = new RegExp(`(?<![àèéòóùì])${vBase}(?![àèéòóùì])`, 'i');
          parola = parola.replace(re, vAccentata);
        }
      }
    } else if (acc.vocale) {
      // Caso IPA: conta le vocali IPA prima di ˈ per trovare la posizione giusta nella parola
      const vOrtografico = {'ɛ':'e','ɔ':'o','e':'e','o':'o','a':'a','i':'i','u':'u'}[acc.vocale] || acc.vocale;
      const vAccentata = {'ɛ':'è','ɔ':'ò','e':'é','o':'ó','a':'à','i':'ì','u':'ù'}[acc.vocale] || acc.vocale;
      // Conta vocali IPA prima di ˈ
      const VOCALI_IPA = new Set('aeiouɛɔwj');
      const posStress = acc.ipa_raw ? acc.ipa_raw.indexOf('ˈ') : -1;
      const ipaRaw = acc.ipa_raw || '';
      let indiceTonico = 0;
      if (posStress > 0) {
        for (let k = 0; k < posStress; k++) {
          if (VOCALI_IPA.has(ipaRaw[k])) indiceTonico++;
        }
      }
      // Trova la indiceTonico-esima vocale nella parola ortografica (saltando u di qu)
      const parolaPerConteggio = parola.replace(/qu/gi, 'q_');
      let posTonica = -1;
      let conta = 0;
      for (let k = 0; k < parolaPerConteggio.length; k++) {
        if ('aeiou'.includes(parolaPerConteggio[k])) {
          if (conta === indiceTonico) { posTonica = k; break; }
          conta++;
        }
      }
      if (posTonica >= 0) {
        parola = parola.slice(0, posTonica) + vAccentata + parola.slice(posTonica + 1);
      } else {
        const re = new RegExp(`(?<![àèéòóùì])${vOrtografico}(?![àèéòóùì])`, 'i');
        parola = parola.replace(re, vAccentata);
      }
    }
  }

  // Traslitterazione
  parola = traslittera(parola);

  // j/w intraparola (FASE 0.5): converte i/u atone davanti a vocale
  // prima della sillabificazione, così la sieresi non li tratta come vocali
  parola = parola.replace(/i\.?(?=[aeiouàèéòóùìɛɔ])/g, 'j');
  parola = parola.replace(/u\.?(?=[aeiouàèéòóùìɛɔ])/g, 'w');
  parola = parola.replace(/ü/g, 'u').replace(/ï/g, 'i');

  // Raddoppiamento finale prestiti
  parola = raddoppiaFinalePrestiti(parola);

  const logAccento = haSegnaccento ? `Accento utente su "${parola.replace(/[^a-zàèéòóùìɛɔ]/gi,'')}"` : null;
  return { frammento: parola + '$', richiesta: false, logAccento };
}

function pulisciDoppiepausa(frase) {
  // Consonante doppia prima di | o $
  frase = frase.replace(/(.)\1(\|)/g, '$1$2');
  frase = frase.replace(/(.)\1(\$)$/g, '$1$2');
  return frase;
}

function raddoppiamentoFonosintattico(frase) {
  const logRF = [];
  // 3a: parole con raddoppiamento iniziale fisso (dio, dea, dei, dee)
  // Solo se precedute da vocale (non da consonante né da inizio stringa)
  for (const parola of PAROLE_RADDOPPIO_INIZIALE) {
    const re = new RegExp('([aeiouàèéòóùìɛɔ|])\\$(' + parola + ')', 'g');
    frase = frase.replace(re, (m, pre, p) => pre + '$' + p[0] + p);
  }

  // Helper: controlla se pos è inizio di s/z+consonante
  function isSImpura(frase, pos) {
    const c = frase[pos];
    if (c !== 's' && c !== 'z') return false;
    const next = frase[pos+1];
    return next && !VOCALI.has(next) && next !== '$' && next !== '|';
  }

  // Helper: controlla se c'è già una doppia (es. bb, tt...)
  function isGiaDopp(frase, pos) {
    return frase[pos] === frase[pos+1];
  }

  // 3b: RF dopo vocale tonica finale (ossitone)
  // pattern: VOCALE_ACCENTATA + $ + C (qualsiasi consonante)
  // escludi: s/z+C (s impura), doppia già presente
  let risultato = '';
  let i = 0;
  while (i < frase.length) {
    if (VOCALI_ACCENTATE.has(frase[i]) && frase[i+1] === '$' && i+2 < frase.length) {
      const posC = i+2;
      const c = frase[posC];
      if (!isSImpura(frase, posC) && !isGiaDopp(frase, posC) && !VOCALI.has(c)) {
        // Raddoppia: elimina $ e inserisce C+C
        risultato += frase[i] + c + c;
        i += 3;
        continue;
      }
    }
    risultato += frase[i];
    i++;
  }
  frase = risultato;

  // 3c: RF dopo parole attivanti
  // Le parole attivanti devono essere parole intere:
  // precedute da inizio stringa, | oppure $
  for (const att of PAROLE_ATTIVANTI) {
    const escaped = att.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    // Lookahead negativo per assicurarci che "att" sia preceduto da $, |, o inizio
    const re = new RegExp('(^|\\$|\\|)(' + escaped + ')\\$(.)', 'g');
    frase = frase.replace(re, (m, pre, parola, c, offset) => {
      const posC = offset + pre.length + parola.length + 1;
      if (isSImpura(frase, posC)) return pre + parola + '$' + c;
      if (isGiaDopp(frase, posC)) return pre + parola + '$' + c;
      if (VOCALI.has(c)) return pre + parola + '$' + c;
      return pre + parola + c + c;
    });
  }

  // 3d: rimuovi tutti i $
  frase = frase.replace(/\$/g, '');
  return { frase, logRF };
}

function autogeminazioni(frase) {
  const CONS = new Set('bdgvlmnrptkfszʃʎɲ');
  function isC(c) { return c && CONS.has(c); }

  // tʃ e dʒ NON si autogeminano (solo ʃ ʎ ɲ ts dz)
  // ATTENZIONE: cercare ts SOLO se non è parte di tʃ (cioè non seguita da ʃ)
  // e cercare dz SOLO se non è parte di dʒ (cioè non seguita da ʒ)
  const simboli = [
    { sym: 'ts', rad: 'tts', esclude: 'ʃ' },  // non raddoppiare tʃ
    { sym: 'dz', rad: 'ddz', esclude: 'ʒ' },  // non raddoppiare dʒ
    { sym: 'ʃ', rad: 'ʃʃ', esclude: null },
    { sym: 'ʎ', rad: 'ʎʎ', esclude: null },
    { sym: 'ɲ', rad: 'ɲɲ', esclude: null },
  ];

  for (const { sym, rad, esclude } of simboli) {
    let i = 0;
    let result = '';
    while (i < frase.length) {
      if (frase.slice(i, i+sym.length) === sym) {
        // Controlla che non faccia parte di un'affricata (es. ts non deve matchare in tʃ)
        const carattereSeguente = frase[i + sym.length] || null;
        if (esclude && carattereSeguente === esclude) {
          // È parte di un'affricata (tʃ o dʒ), non raddoppiare
          result += frase[i];
          i++;
          continue;
        }
        const pre = i > 0 ? frase[i-1] : null;
        const post = carattereSeguente;
        const preOk = !pre || !isC(pre);
        const postOk = !post || !isC(post);
        if (preOk && postOk) {
          result += rad;
        } else {
          result += sym;
        }
        i += sym.length;
      } else {
        result += frase[i];
        i++;
      }
    }
    frase = result;
  }
  return frase;
}

function eliminaIPalatali(frase) {
  const palatali = ['ʃi','ʎi','ɲi','tʃi','dʒi'];
  const VOCALI_STR = 'aeiouàèéòóùìɛɔ';
  for (const pal of palatali) {
    const base = pal.slice(0,-1);
    const re = new RegExp(pal.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + `(?=[${VOCALI_STR}])`, 'g');
    frase = frase.replace(re, base);
  }
  return frase;
}

function sonorizzaS(frase) {
  const SONORE = 'bdgvlmnr';
  let result = [...frase];
  for (let i = 0; i < result.length; i++) {
    if (result[i] === 's') {
      const pre = i > 0 ? result[i-1] : null;
      const post = result[i+1] || null;
      if (post && SONORE.includes(post) && pre !== 's') {
        result[i] = 'z';
      }
    }
  }
  return result.join('');
}

// Scala di sonorità per la sineresi
const SONORITA_V = { 'a':1,'à':1,'ɛ':2,'ɔ':2,'e':3,'è':3,'é':3,'o':3,'ò':3,'ó':3,'i':4,'ì':4,'u':4,'ù':4 };
const ACCENTATE_V = new Set('àèéòóùìɛɔ');
function puoFondere(v1, v2) {
  const s1 = SONORITA_V[v1] || 4, s2 = SONORITA_V[v2] || 4;
  // Se v2 è accentata → sempre iato (vocale tonica non può essere in dittongo)
  if (ACCENTATE_V.has(v2)) return false;
  // Eccezione 2: v1 accentata e v2 più sonora (s2 < s1)
  if (ACCENTATE_V.has(v1) && s2 < s1) return false;
  // Eccezione 3: v1 atona, v2 accentata e meno sonora — già coperta sopra
  return true;
}

// Sillabificazione
function tokenizzaFonetica(s) {
  const tokens = [];
  let i = 0;
  while (i < s.length) {
    let matched = false;
    for (const aff of [...AFFRICATE_DOPPIE, ...AFFRICATE_SCEMPIE]) {
      if (s.slice(i, i+aff.length) === aff) {
        tokens.push(aff); i += aff.length; matched = true; break;
      }
    }
    if (!matched) { tokens.push(s[i]); i++; }
  }
  return tokens;
}

function sillabifica(frase) {
  const VOCALI_SET = new Set('aeiouàèéòóùìɛɔ');
  const LIQUIDE = new Set('lr');
  const OSTRUENTI = new Set('pbtdkgfvszʃtʃdʒtsdz');

  const isV = c => VOCALI_SET.has(c[0]);
  const isC = c => c && !VOCALI_SET.has(c[0]) && c !== '|' && c !== '.';

  const blocchi = frase.split('|');
  const risultati = [];

  for (const blocco of blocchi) {
    if (!blocco) { risultati.push(''); continue; }
    const tokens = tokenizzaFonetica(blocco);
    const n = tokens.length;
    const punti = new Array(n).fill(false);

    let i = 0;
    while (i < n) {
      if (!isV(tokens[i])) { i++; continue; }

      // Raccoglie consonanti fino alla prossima vocale
      let j = i+1;
      const cons = [];
      while (j < n && !isV(tokens[j])) { cons.push([j, tokens[j]]); j++; }
      const hasNextV = j < n;
      // % = marcatore di iato obbligatorio (non è una consonante reale)
      const iato = cons.some(([,c]) => c === '%');
      const consReali = cons.filter(([,c]) => c !== '%');
      const nc = consReali.length;

      if (nc === 0) {
        // V.V: metti punto se iato obbligatorio (%) o se non si può formare dittongo
        if (hasNextV && (iato || !puoFondere(tokens[i], tokens[j]))) punti[j] = true;
      } else if (nc === 1) {
        const [idx, c] = consReali[0];
        if (hasNextV) {
          if (AFFRICATE_DOPPIE.includes(c)) {
            // affricata doppia: Vt.tʃV — punto PRIMA e poi interno
            // Per semplicità: punto prima del token affricato doppio
            // poi nella stampa lo splittiamo
            punti[idx] = true;
          } else {
            // tutto con incipit (consonante singola, affricata scempia, ecc.)
            punti[idx] = true;
          }
        }
      } else if (nc === 2) {
        const [idx1, c1] = consReali[0];
        const [idx2, c2] = consReali[1];
        if (c1 === 'j' || c1 === 'w') {
          // semivocale in attacco: j/w sempre nell'incipit della sillaba seguente
          if (hasNextV) punti[idx1] = true;
        } else if (c2 === 'j' || c2 === 'w') {
          // C + semivocale: punto prima di c1
          // Se c1 è affricata doppia (tts→t.ts+j → nat.tsj), l'handler la spezza normalmente
          if (hasNextV) punti[idx1] = true;
        } else if (c1 === c2) {
          // doppia: VC.CV
          if (hasNextV) punti[idx2] = true;
        } else if (c1 === 's' || c1 === 'z') {
          // s/z + C → s.C (s in coda alla sillaba precedente)
          if (hasNextV) punti[idx2] = true;
        } else if (LIQUIDE.has(c2[0]) && OSTRUENTI.has(c1[0])) {
          // nesso indivisibile: V.C1C2V
          if (hasNextV) punti[idx1] = true;
        } else {
          // VC1.C2V
          if (hasNextV) punti[idx2] = true;
        }
      } else {
        // 3+ consonanti
        const [idx1, c1] = consReali[0];
        const [idx2, c2] = consReali[1];
        const [idx3, c3] = consReali[2];
        if (c1 === 's' || c1 === 'z') {
          // s/z + CC → s.CC (s in coda, nesso in incipit)
          if (hasNextV) punti[idx2] = true;
        } else {
          if (hasNextV) punti[idx2] = true;
        }
      }
      i++;
    }

    // Costruisci stringa con punti e gestione affricate doppie
    let parti = '';
    for (let k = 0; k < tokens.length; k++) {
      const t = tokens[k];
      if (punti[k] && k > 0) {
        if (AFFRICATE_DOPPIE.includes(t)) {
          const nextT = tokens[k+1];
          if (nextT === 'j' || nextT === 'w') {
            // affricata doppia + semivocale: spezza normalmente t.ts, poi j va con ts
            // nat + tts + j → nat + t.ts + j → nat.tsj → nat.tsjóne ✓
            parti += t[0] + '.' + t.slice(1);
          } else {
            // caso normale: tts → t.ts
            parti += t[0] + '.' + t.slice(1);
          }
          continue;
        }
        parti += '.' + t;
      } else {
        parti += t;
      }
    }
    risultati.push(parti);
  }

  // Rimuovi marcatori di iato obbligatorio %
  return risultati.join('|').replace(/%/g, '');
}

function individuaJW(frase) {
  const log = [];
  // Caso con punto sillabico: i/u + . + vocale → j/w (logga)
  frase = frase.replace(/i\.(?=[aeiouàèéòóùìɛɔ])/g, (m, o, s) => {
    log.push({ testo: `i → j (davanti a vocale)`, sylIdx: -1 }); return 'j';
  });
  frase = frase.replace(/u\.(?=[aeiouàèéòóùìɛɔ])/g, (m, o, s) => {
    log.push({ testo: `u → w (davanti a vocale)`, sylIdx: -1 }); return 'w';
  });
  // Caso intraparola: non logga (già gestito dalla FASE 0.5)
  frase = frase.replace(/i(?=[aeiouàèéòóùìɛɔ])/g, 'j');
  frase = frase.replace(/u(?=[aeiouàèéòóùìɛɔ])/g, 'w');
  frase = frase.replace(/ü/g, 'u').replace(/ï/g, 'i');
  return { frase, log };
}

function sinalefe(frase, ombra) {
  // ɛ e ɔ sono sempre toniche → non partecipano alla sinalefe
  const AT = 'aeiou';
  const log = [];
  ombra = ombra || frase;

  // Degeminazione con punto: V(ː)? + . + V uguale → cancella una, registra '-' nell'ombra
  frase = frase.replace(new RegExp(`([${AT}])\\.\\1`, 'g'), (m, v, offset) => {
    log.push({ testo: `Dege. vocalica di "${v}"`, sylIdx: -1 });
    // Nell'ombra: rimuovi il punto (come frase) e sostituisci la seconda vocale con '-'
    ombra = ombra.slice(0, offset + 1) + ombra.slice(offset + 2, offset + m.length) + '-' + ombra.slice(offset + m.length);
    return v;
  });

  // Sinalefe con punto: V1 + . + V2 diverse → rimuovi punto da frase E da ombra
  frase = frase.replace(new RegExp(`([${AT}])\\.([${AT}])`, 'g'), (m, v1, v2, offset) => {
    log.push({ testo: `Sinalefe di "${v1}"`, sylIdx: -1 });
    // Rimuovi il punto anche dall'ombra
    ombra = ombra.slice(0, offset + 1) + ombra.slice(offset + 2);
    return `${v1}${v2}`;
  });

  // Degeminazione senza punto: VV adiacenti uguali (già fuse da RF)
  frase = frase.replace(new RegExp(`([${AT}])\\1`, 'g'), (m, v, offset) => {
    log.push({ testo: `Dege. vocalica di "${v}"`, sylIdx: -1 });
    // Sostituisci la seconda vocale con '-' nell'ombra
    ombra = ombra.slice(0, offset + 1) + '-' + ombra.slice(offset + 2);
    return v;
  });

  // Sinalefe senza punto: V1V2 adiacenti diverse (già fuse da RF)
  frase = frase.replace(new RegExp(`([${AT}])([${AT}])`, 'g'), (m, v1, v2) => {
    log.push({ testo: `Sinalefe di "${v1}"`, sylIdx: -1 });
    return `${v1}${v2}`;
  });

  // elimina tutti i |
  frase = frase.replace(/\|/g, '');
  ombra = ombra.replace(/\|/g, '');
  return { frase, log, ombra };
}

function assimilaNasale(frase) {
  const log = [];
  const P = '\\.?[ˈˌ]?';
  const regole = [
    [new RegExp(`[nm](?=${P}kw)`, 'g'), 'ŋ', 'velare (kw)'],
    [new RegExp(`[nm](?=${P}gw)`, 'g'), 'ŋ', 'velare (gw)'],
    [new RegExp(`[nm](?=${P}k)`, 'g'), 'ŋ', 'velare (k)'],
    [new RegExp(`[nm](?=${P}g)`, 'g'), 'ŋ', 'velare (g)'],
    [new RegExp(`[nm](?=${P}f)`, 'g'), 'ɱ', 'labiodenale (f)'],
    [new RegExp(`[nm](?=${P}v)`, 'g'), 'ɱ', 'labiodenale (v)'],
    [new RegExp(`[nm](?=${P}p)`, 'g'), 'm', 'bilabiale (p)'],
    [new RegExp(`[nm](?=${P}b)`, 'g'), 'm', 'bilabiale (b)'],
    [new RegExp(`n(?=${P}m)`, 'g'), 'm', 'bilabiale (m)'],
  ];
  const logConPos = [];
  for (const [pat, sost, luogo] of regole) {
    frase = frase.replace(pat, (m, offset) => {
      logConPos.push({ testo: `Assim. nasale: ${m} → ${sost} (${luogo})`, sylIdx: -1, _pos: offset });
      return sost;
    });
  }
  // Ordina per posizione nella stringa per garantire corrispondenza con sillabe
  logConPos.sort((a, b) => a._pos - b._pos);
  // Per ogni voce, calcola quante occorrenze dello stesso simbolo risultante
  // esistono PRIMA di questa posizione nella stringa post-assimilazione.
  // Questo ci permette di trovare la sillaba giusta dopo la sillabificazione.
  const occCount = {};
  const logAN = logConPos.map(entry => {
    const { _pos, ...e } = entry;
    const m2 = e.testo.match(/→ ([ŋɱɲm])/);
    if (!m2) return e;
    const sim = m2[1];
    // Conta occorrenze di sim in frase prima di _pos
    const strPrima = frase.slice(0, _pos);
    const occPrima = (strPrima.match(new RegExp(sim, 'g')) || []).length;
    occCount[sim] = occCount[sim] || 0;
    const occIdx = occPrima; // indice assoluto di questa occorrenza nella stringa finale
    return { ...e, _simIdx: { sim, occIdx } };
  });
  return { frase, log: logAN };
}

function jwSintagmatico(frase) {
  const log = [];
  frase = frase.replace(/(?<![ˈˌ])i(?=[aeiouɛɔàèéòóùì])/g, (m) => {
    log.push({ testo: `i → j (post-sinalefe)`, sylIdx: -1 }); return 'j';
  });
  frase = frase.replace(/(?<![ˈˌ])u(?=[aeiouɛɔàèéòóùì])/g, (m) => {
    log.push({ testo: `u → w (post-sinalefe)`, sylIdx: -1 }); return 'w';
  });
  return { frase, log };
}

function costruisciSillabe(frase) {
  const parti = frase.split('.');
  if (!parti.length) return [];
  const sillabe = [parti[0]];
  for (let k = 1; k < parti.length; k++) sillabe.push('.' + parti[k]);
  return sillabe;
}

const MAPPA_ACCENTO = { 'à':'a','ì':'i','é':'e','ó':'o','ù':'u','è':'ɛ','ò':'ɔ','ɛ':'ɛ','ɔ':'ɔ' };

function marcaToniche(sillabe) {
  const log = [];
  const result = sillabe.map((sillaba, idx) => {
    for (const [acc, base] of Object.entries(MAPPA_ACCENTO)) {
      if (sillaba.includes(acc)) {
        let nuova = sillaba.replace(acc, base);
        if (nuova.startsWith('.')) nuova = '.ˈ' + nuova.slice(1);
        else nuova = 'ˈ' + nuova;
        const core = nuova.replace(/^[.ˈˌ]*/,'');
        if (core[core.length-1] === base) {
          nuova = nuova.replace(base, base + 'ː');
          log.push({ testo: `Allungamento di "${base}" in sillaba libera`, sylIdx: idx });
        }
        return nuova;
      }
    }
    return sillaba;
  });
  return { sillabe: result, log };
}

function risolviScontri(sillabe) {
  const log = [];
  let cambiamento = true;
  while (cambiamento) {
    cambiamento = false;
    for (let i = 0; i < sillabe.length-1; i++) {
      const s1 = sillabe[i].replace(/^\./,'');
      const s2 = sillabe[i+1].replace(/^\./,'');
      if (s1.startsWith('ˈ') && s2.startsWith('ˈ')) {
        const punto = sillabe[i].startsWith('.') ? '.' : '';
        sillabe[i] = punto + sillabe[i].replace(/^\./,'').slice(1);
        log.push({ testo: `Scontro: "${sillabe[i].replace(/^[.ˈˌ]*/,'')}" → atona`, sylIdx: i });
        cambiamento = true;
      }
    }
  }
  return { sillabe, log };
}

function risolviValli(sillabe) {
  const log = [];
  const isAtona = s => { const c = s.replace(/^\./,''); return !c.startsWith('ˈ') && !c.startsWith('ˌ'); };
  let cambiamento = true;
  while (cambiamento) {
    cambiamento = false;
    for (let i = 0; i < sillabe.length-2; i++) {
      if (isAtona(sillabe[i]) && isAtona(sillabe[i+1]) && isAtona(sillabe[i+2])) {
        const punto = sillabe[i+1].startsWith('.') ? '.' : '';
        sillabe[i+1] = punto + 'ˌ' + sillabe[i+1].replace(/^\./,'');
        const core = sillabe[i+1].replace(/^[.ˌ]*/,'');
        log.push({ testo: `Acc. secondario su "${core}"`, sylIdx: i+1 });
        cambiamento = true;
      }
    }
  }
  return { sillabe, log };
}

function trascrivi(testo, wiktFn) {
  // FASE 1: ciclo sui frammenti
  const frammenti = tokenizza(testo);
  let frase = '';
  const logUtente = [];

  for (const fr of frammenti) {
    if ('.,;:!?'.includes(fr)) { frase += '|'; continue; }
    const { frammento, richiesta, msg, logAccento } = elaboraParola(fr, wiktFn);
    if (richiesta) return { trascrizione: '', log_scontri: [], log_sinalefe: [], richiesta_utente: true, messaggio: msg };
    if (logAccento) logUtente.push({ testo: logAccento, sylIdx: -1 });
    frase += frammento;
  }

  // FASE 2: pulizia doppie prima di pausa
  frase = pulisciDoppiepausa(frase);

  // FASE 2.5: costruisce stringa ombra con marcatori confine di parola
  // * = carattere a sinistra di $ (fine parola), & = carattere a destra di $ (inizio parola)
  // La stringa ombra segue tutte le trasformazioni della stringa principale
  let ombra = '';
  for (let k = 0; k < frase.length; k++) {
    if (frase[k] === '$') {
      // Segna il carattere precedente come fine-parola e il successivo come inizio-parola
      if (ombra.length > 0) ombra = ombra.slice(0,-1) + '*'; // rimarca l'ultimo char
      if (k+1 < frase.length && frase[k+1] !== '$' && frase[k+1] !== '|') {
        ombra += '&';
        k++; // consuma il $ e aggiunge & per il char successivo
        ombra += frase[k]; // aggiunge il char successivo con marcatore già segnato
      }
    } else {
      ombra += frase[k];
    }
  }
  const logSill = [];
  const { frase: fraseRF, logRF } = raddoppiamentoFonosintattico(frase);
  frase = fraseRF;

  // FASE 4: autogeminazioni
  frase = autogeminazioni(frase);
  ombra = autogeminazioni(ombra); // replica sull'ombra per mantenere lunghezza allineata

  // FASE 5: elimina i dopo palatali
  frase = eliminaIPalatali(frase);
  ombra = eliminaIPalatali(ombra);

  // FASE 6: sonorizzazione s
  frase = sonorizzaS(frase);

  // FASE 7: sillabificazione
  frase = sillabifica(frase);
  // Applica la stessa sillabificazione all'ombra (stessa struttura, solo caratteri diversi)
  ombra = sillabifica(ombra);

  // FASE 8: j e w
  const { frase: fraseJW, log: logJW } = individuaJW(frase);
  frase = fraseJW;

  // FASE 9: sinalefe
  const { frase: frasePost, log: logSinalefe, ombra: ombraPost } = sinalefe(frase, ombra);
  frase = frasePost;
  ombra = ombraPost;

  // FASE 9.5: assimilazione nasale
  const { frase: fraseAN, log: logAN } = assimilaNasale(frase);
  frase = fraseAN;

  // FASE 9.6: j/w sintagmatico (i/u atoni in fine sillaba + vocale seguente)
  const { frase: fraseJWS, log: logJWS } = jwSintagmatico(frase);
  frase = fraseJWS;

  // FASE 10: costruisci sillabe
  let sillabe = costruisciSillabe(frase);

  // FASE 11: marca toniche
  const { sillabe: sillabeM, log: logCronema } = marcaToniche(sillabe);
  sillabe = sillabeM;

  // FASE 12: scontri accentuali
  const { sillabe: s2, log: logScontri } = risolviScontri(sillabe);
  sillabe = s2;

  // FASE 13: valli accentuali
  const { sillabe: s3, log: logValli } = risolviValli(sillabe);
  sillabe = s3;

  // FASE 13.5: rimuovi cronema sull'ultima sillaba (finale di enunciato)
  if (sillabe.length > 0) {
    const lastIdx = sillabe.length - 1;
    if (sillabe[lastIdx].includes('ː')) {
      sillabe[lastIdx] = sillabe[lastIdx].replace(/ː$/, '');
      // Rimuovi dal log il cronema sull'ultima sillaba
      const iLast = logCronema.findIndex(e => e.sylIdx === lastIdx);
      if (iLast >= 0) logCronema.splice(iLast, 1);
    }
  }

  // FASE 14: output
  const trascrizione = '[' + sillabe.join('') + ']';

  // Arricchisci logSinalefe con indici sillabici
  // Ogni fenomeno di sinalefe avviene al confine tra due sillabe adiacenti
  // Troviamo le sillabe coinvolte cercando le coppie di sillabe adiacenti
  // dove la prima termina con vocale e la seconda inizia con vocale (già fuse)
  // Usa ombra sillabificata per trovare posizioni delle degeminazioni
  // '-' nell'ombra indica dove una vocale è stata rimossa
  const degeSylIdx = [];
  {
    const sillabeOmbra = costruisciSillabe(ombra);
    let ordine = 0;
    sillabeOmbra.forEach((sil, idx) => {
      if (sil.includes('-')) {
        ordine++;
        // La posizione nella sillaba corrisponde al carattere superstite
        // nel logSinalefeFull, il carattere superstite è nella stessa sillaba
        degeSylIdx.push(idx);
      }
    });
  }

  // Arricchisci logSinalefe/dege con sylIdx
  // Sinalefe: cerca sillaba con due vocali consecutive (VV) dove V1=vocale coinvolta
  // Degeminazione: usa degeSylIdx dalla stringa ombra
  const VOCALI_BASE = new Set('aeiou');
  const sinIdx = { sin: 0, deg: 0 }; // cursori separati per sinalefe e degeminazione
  const sinSyllables = []; // sillabe con VV (sinalefe)
  const degSyllables = []; // sillabe con VV uguale (degeminazione)
  for (let i = 0; i < sillabe.length; i++) {
    const core = sillabe[i].replace(/^[.ˈˌ]*/,'').replace(/ː/g,'');
    for (let k = 0; k < core.length - 1; k++) {
      if (VOCALI_BASE.has(core[k]) && VOCALI_BASE.has(core[k+1])) {
        if (core[k] === core[k+1]) degSyllables.push({ idx: i, v: core[k] });
        else sinSyllables.push({ idx: i, v1: core[k], v2: core[k+1] });
        break;
      }
    }
  }
  let sinCursor = 0, degCursor = 0;
  const logSinalefeFull = logSinalefe.map(entry => {
    if (typeof entry !== 'object') return entry;
    const m = entry.testo.match(/"([aeiou])"/);
    if (!m) return entry;
    const vocale = m[1];
    if (entry.testo.startsWith('Dege.')) {
      // Degeminazione: usa indice dalla stringa ombra
      if (degCursor < degeSylIdx.length) {
        const idx = degeSylIdx[degCursor++];
        return { ...entry, sylIdx: idx };
      }
    } else {
      // Sinalefe: cerca in sinSyllables dove v1=vocale
      for (let i = sinCursor; i < sinSyllables.length; i++) {
        if (sinSyllables[i].v1 === vocale) {
          sinCursor = i + 1;
          return { ...entry, sylIdx: sinSyllables[i].idx };
        }
      }
    }
    return entry;
  });

  // Arricchisci logAN con sylIdx usando la posizione _pos nella stringa
  // Costruiamo una mappa posizione→indice sillaba dalla stringa sillabificata
  {
    // frase sillabificata = sillabe.join(''), ma i punti/marcatori non corrispondono
    // alla stringa pre-sillabificazione. Usiamo la lunghezza cumulativa delle sillabe.
  }
  const logANFull = logAN.map(entry => {
    if (typeof entry !== 'object') return entry;
    const { _simIdx, ...entryClean } = entry;
    if (!_simIdx) return entryClean;
    const { sim, occIdx } = _simIdx;
    // Trova la occIdx-esima occorrenza di sim nelle sillabe
    let trovate = 0;
    // sim è sempre uno di ŋ ɱ ɲ m — nessun carattere speciale regex
    for (let i = 0; i < sillabe.length; i++) {
      const core = sillabe[i].replace(/^[.ˈˌ]+/, '');
      const occ = (core.match(new RegExp(sim, 'g')) || []).length;
      for (let k = 0; k < occ; k++) {
        if (trovate === occIdx) return { ...entryClean, sylIdx: i };
        trovate++;
      }
    }
    return entryClean;
  });
  // Aggiungi logId univoco a ogni voce di log (separato per sezione)
  const log = [...logScontri, ...logValli];
  log.forEach((e, i) => { if (typeof e === 'object') e.logId = 'a' + i; });
  const logFenomeni = [...logUtente, ...logRF, ...logJW, ...logJWS, ...logANFull, ...logCronema, ...logSinalefeFull];
  logFenomeni.forEach((e, i) => { if (typeof e === 'object') e.logId = 'f' + i; });
  return { trascrizione, log_scontri: log, log_sinalefe: logFenomeni, richiesta_utente: false, messaggio: '' };
}
