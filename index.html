<style>

    --red: #991b1b;
    --red-bg: #fef2f2;

    min-height: 100vh;
    padding: 2rem 1rem 4rem;

  .wrap { max-width: 680px; margin: 0 auto; }

    font-size: 1.5rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 0.2rem;
  }
  .subtitle {
    font-size: 0.78rem;
    font-family: var(--mono);
    color: var(--muted);
    margin-bottom: 2rem;
    letter-spacing: 0.04em;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.25rem 1.5rem;
    margin-bottom: 1rem;
  }
  .label {
    font-family: var(--mono);
    font-size: 0.65rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    display: block;
    margin-bottom: 0.6rem;
  }
  .frase-text {
    font-size: 1.35rem;
    font-style: italic;
    line-height: 1.5;
    color: var(--text);
  }
  .frase-note {
    margin-top: 0.75rem;
    padding-top: 0.75rem;
    border-top: 1px solid var(--border);
    font-size: 0.75rem;
    font-family: var(--mono);
    color: var(--muted);
    line-height: 1.6;
  }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; gap: 0.4rem;
    font-family: var(--mono); font-size: 0.78rem; font-weight: 500;
    padding: 0.55rem 1.1rem; border-radius: 7px;
    border: 1px solid var(--border);
    cursor: pointer; background: transparent; color: var(--text);
    transition: all 0.15s;
  }
  .btn:hover { background: var(--bg); border-color: #c5bfb8; }
  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
  .btn-primary {
    background: var(--text); color: #fff; border-color: var(--text);
  }
  .btn-primary:hover { background: #292524; }
  .btn-row { display: flex; gap: 0.5rem; flex-wrap: wrap; }

  /* IPA keyboard */
  .ipa-kb { margin-bottom: 1rem; }
  .ipa-group { margin-bottom: 0.6rem; }
  .ipa-group-label {
    font-family: var(--mono); font-size: 0.6rem; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.1em;
    display: block; margin-bottom: 0.35rem;
  }
  .ipa-keys { display: flex; flex-wrap: wrap; gap: 0.35rem; }
  .ipa-key {
    font-family: var(--mono); font-size: 0.9rem;
    padding: 0.3rem 0.6rem; border-radius: 5px;
    border: 1px solid var(--border); background: var(--bg);
    cursor: pointer; color: var(--text); transition: all 0.12s;
  }
  .ipa-key:hover { background: var(--accent-light); border-color: var(--accent-border); }
  .ipa-key:active { transform: scale(0.93); }

  /* Textarea */
  textarea {
    width: 100%; font-family: var(--mono); font-size: 1rem;
    padding: 0.75rem 1rem; border-radius: 8px;
    border: 1px solid var(--border); background: var(--bg);
    color: var(--text); resize: vertical; min-height: 80px;
    line-height: 1.6; outline: none; margin-bottom: 0.75rem;
    transition: border-color 0.15s;
  }
  textarea:focus { border-color: #a8a29e; }

  /* Spinner */
  .spinner {
    display: inline-block; width: 12px; height: 12px;
    border: 2px solid var(--border); border-top-color: var(--muted);
    border-radius: 50%; animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Results */
  .ipa-result {
    font-family: var(--mono); font-size: 0.95rem;
    background: var(--bg); padding: 0.75rem 1rem;
    border-radius: 7px; display: block;
    word-break: break-all; line-height: 1.8;
    margin-bottom: 0.75rem; color: var(--text);
  }
  .esito-badge {
    display: inline-block; font-family: var(--mono);
    font-size: 0.7rem; padding: 0.25rem 0.6rem;
    border-radius: 4px; margin-bottom: 0.75rem;

  .esito-parziale { background: var(--yellow-bg); color: var(--yellow); }
  .esito-errato   { background: var(--red-bg);    color: var(--red);   }

  .divider { border: none; border-top: 1px solid var(--border); margin: 0.75rem 0; }

  /* Log scontri */
  .log-item {
    font-family: var(--mono); font-size: 0.72rem; color: var(--muted);
    padding: 0.2rem 0; line-height: 1.5;
  }

  /* Page 2: needs_input */
  .word-input-block {
    padding: 0.9rem 0;
    border-bottom: 1px solid var(--border);
  }
  .word-input-block:last-child { border-bottom: none; }
  .word-label {
    font-style: italic; font-size: 1.05rem; margin-bottom: 0.5rem;
  }
  .choice-row {
    display: flex; align-items: center; gap: 0.4rem;
    flex-wrap: wrap; margin-bottom: 0.35rem;
  }
  .choice-lbl {
    font-family: var(--mono); font-size: 0.65rem; color: var(--muted);
    min-width: 120px;
  }
  .cbtn {
    font-family: var(--mono); font-size: 0.75rem;
    padding: 0.25rem 0.7rem; border-radius: 5px;
    border: 1px solid var(--border); cursor: pointer;
    background: transparent; color: var(--text); transition: all 0.12s;
  }
  .cbtn:hover { background: var(--bg); }
  .cbtn.sel { background: var(--text); color: #fff; border-color: var(--text); }

  /* Source badge */
  .src { display: inline-block; font-family: var(--mono); font-size: 0.6rem;
    padding: 0.1rem 0.4rem; border-radius: 3px; margin-left: 0.3rem; }
  .src-wikt { background: #dcfce7; color: #166534; }
  .src-utente { background: #f1f5f9; color: #475569; }

  /* Unavail */
  .unavail {
    font-family: var(--mono); font-size: 0.78rem;
    color: var(--yellow); background: var(--yellow-bg);
    border: 1px solid var(--accent-border);
    border-radius: 7px; padding: 0.7rem 1rem; margin-top: 0.5rem;
  }

  /* Footer */
  footer {
    font-family: var(--mono); font-size: 0.65rem; color: #c5bfb8;
    text-align: center; margin-top: 2.5rem;
    letter-spacing: 0.05em;
  }

  /* Custom input */
  .text-input {
    width: 100%; font-family: var(--serif); font-style: italic;
    font-size: 1.1rem; padding: 0.65rem 1rem; border-radius: 8px;
    border: 1px solid var(--border); background: var(--bg);
    color: var(--text); outline: none; margin-bottom: 0.6rem;
    transition: border-color 0.15s;
  }
  .text-input:focus { border-color: #a8a29e; }

  /* Loading page */
  .loading-msg {
    font-family: var(--mono); font-size: 0.82rem;
    color: var(--muted); display: flex; align-items: center; gap: 0.5rem;
  }
</style>

// ═══════════════════════════════════════════════════════
// WIKTIONARY LOOKUP
// ═══════════════════════════════════════════════════════
async function wiktionaryLookup(word) {
  const encoded = encodeURIComponent(word.toLowerCase());
  const url = `https://en.wiktionary.org/w/api.php?action=parse&page=${encoded}&prop=wikitext&format=json&origin=*`;
  try {
    const resp = await fetch(url);
    const data = await resp.json();
    if (!data.parse) return null;
    const wikitext = data.parse.wikitext['*'];
    // Estrai sezione italiana
    const itMatch = wikitext.match(/==Italian==([\s\S]*?)(?:\n==[^=]|$)/);
    if (!itMatch) return null;
    const itText = itMatch[1];

    // Prova prima {{IPA|it|/.../ }}
    const ipaMatches = [...itText.matchAll(/\{\{IPA\|it\|([^}]+)\}\}/g)];
    if (ipaMatches.length) {
      const raw = ipaMatches[0][1].split('|')[0].replace(/[/\[\]]/g, '').trim();
      return { tipo: 'ipa', valore: raw };
    }

    // Poi {{it-pr|...}} — contiene la parola con accenti grafici
    const itPrMatch = itText.match(/\{\{it-pr\|([^}|<]+)/);
    if (itPrMatch) {
      // Prende solo la prima variante (es. "débito,dèbito" → "débito")
      const prima = itPrMatch[1].trim().split(',')[0].trim();
      // Gestisce notazione con punti sillabici (es. "lì.mi.te" → "lìmite")
      const senzaPunti = prima.replace(/\./g, '');
      return { tipo: 'it-pr', valore: senzaPunti };
    }

    return null;
  } catch(e) { return null; }
}

function parseWiktionaryResult(risultato, word) {
  if (!risultato) return null;

  let ipaStr = null;
  let accentoGrafico = null; // parola con accenti come in it-pr (es. "càne", "giornàta")

  if (risultato.tipo === 'ipa') {
    ipaStr = risultato.valore;
  } else if (risultato.tipo === 'it-pr') {
    accentoGrafico = risultato.valore;
    // Costruisci uno pseudo-IPA minimale per rilevare s/z sonore
    // (it-pr non contiene info s/z, lasciamo null)
    ipaStr = null;
  }

  // Rileva s/z sonore dall'IPA (solo se disponibile)
  const hasVoicedS = ipaStr ? /(?<![dt])z(?![dt])/.test(ipaStr) : false;
  const hasVoicedZ = ipaStr ? ipaStr.includes('dz') : false;
  const hasVoicelessZ = ipaStr ? ipaStr.includes('ts') : false;
  const hasEpsilon = ipaStr ? ipaStr.includes('ɛ') : false;
  const hasOpenO = ipaStr ? ipaStr.includes('ɔ') : false;

  // Estrai accento:
  // Caso 1: da IPA con ˈ
  let accento = null;
  if (ipaStr) {
    const tonicMatch = ipaStr.match(/ˈ([aeiouɛɔ])/);
    if (tonicMatch) {
      const v = tonicMatch[1];
      const qualita = ['ɛ','ɔ'].includes(v) ? 'aperta' : ['e','o'].includes(v) ? 'chiusa' : 'normale';
      accento = { qualita, vocale: v, tipo: 'ipa' };
    }
  }

  // Caso 2: da it-pr con accenti grafici (es. "càne" → a tonica, "bèllo" → ɛ)
  if (!accento && accentoGrafico) {
    // Cerca vocale con accento grafico
    const accentoMatch = accentoGrafico.match(/([àèéòóùì])/);
    if (accentoMatch) {
      const va = accentoMatch[1];
      const mappa = { 'à':'a','è':'ɛ','é':'e','ò':'ɔ','ó':'o','ù':'u','ì':'i' };
      const v = mappa[va] || va;
      const qualita = ['ɛ','ɔ'].includes(v) ? 'aperta' : ['e','o'].includes(v) ? 'chiusa' : 'normale';
      accento = { qualita, vocale: v, tipo: 'it-pr', grafico: va };
    } else {
      // Parola piana senza accento esplicito: tonica sulla penultima vocale
      // Lo gestiamo in elaboraParola come "accento piano"
      accento = { qualita: 'normale', vocale: null, tipo: 'piano' };
    }
  }

  return {
    word,
    ipa_raw: ipaStr || accentoGrafico || '',
    has_epsilon: hasEpsilon, has_open_o: hasOpenO,
    has_voiced_s: hasVoicedS, has_voiced_z: hasVoicedZ, has_voiceless_z: hasVoicelessZ,
    source: 'wiktionary',
    trovato: true, omografi: [], s_sonore: [],
    z_indici_sonori: hasVoicedZ ? [0] : [],
    accento,
    accentoGrafico, // conserva la forma it-pr per uso in elaboraParola
  };
}

// Mantieni compatibilità: wrapper che chiama parseWiktionaryResult
function parseWiktionaryIpa(ipaStr, word) {
  return parseWiktionaryResult({ tipo: 'ipa', valore: ipaStr }, word);
}

async function doLookup(frase) {
  const words = [...new Set((frase.match(/[a-zA-ZÀ-ù]+/g) || []).map(w => w.toLowerCase()))];
  const results = [];
  const needsInput = []; // solo parole con s/z davvero ambigue (non trovate su Wiktionary)
  for (const word of words) {
    const clean = word.replace(/[^\w]/g, '');
    if (!clean) continue;
    const risultato = await wiktionaryLookup(clean);
    if (risultato) {
      const info = parseWiktionaryResult(risultato, clean);
      if (info) results.push(info);
      // NON aggiungere a needsInput: Wiktionary ha risposto
    } else {
      // Non trovata: chiedi solo se la parola contiene s o z intervocaliche
      // (le uniche cose che non possiamo sapere senza dizionario)
      const hasSZ = /[aeiou][sz][aeiou]/i.test(clean);
      if (hasSZ && clean.length > 3) needsInput.push(clean);
    }
  }
  return { results, needsInput };
}

function normalizzaIpa(s) { return s.replace(/[\[\]\s]/g,'').trim(); }

function levenshtein(a, b) {
  const m = a.length, n = b.length;
  let dp = Array.from({length: n+1}, (_,i) => i);
  for (let i = 1; i <= m; i++) {
    const prev = [...dp]; dp[0] = i;
    for (let j = 1; j <= n; j++) {
      dp[j] = a[i-1]===b[j-1] ? prev[j-1] : 1+Math.min(prev[j], dp[j-1], prev[j-1]);
    }
  }
  return dp[n];
}

function confronta(studente, corretta) {
  const s = normalizzaIpa(studente), c = normalizzaIpa(corretta);
  if (s === c) return 'corretto';
  const dist = levenshtein(s, c);
  const ratio = dist / Math.max(s.length, c.length, 1);
  return ratio <= 0.10 ? 'parzialmente_corretto' : 'errato';
}

let state = {
  page: 0,         // 0=home 1=loading 2=input_utente 3=trascrizione 4=risultato
  frase: '',
  customFrase: '',
  showCustom: false,
  infoParole: [],
  needsInput: [],
  userChoices: {},  // word -> {v, sz}
  ipaValue: '',
  result: null,     // {trascrizione_corretta, esito, log_scontri}
  error: '',
};

function setState(patch) { Object.assign(state, patch); render(); }

// ═══════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════
function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';
  if (state.page === 0) app.appendChild(renderHome());
  else if (state.page === 1) app.appendChild(renderLoading());
  else if (state.page === 2) app.appendChild(renderInput());
  else if (state.page === 3) app.appendChild(renderTrascrizione());
}

// ─── HOME ───────────────────────────────────────────
function renderHome() {
  const div = el('div');
  const card = el('div','card');

  card.appendChild(lbl('Inserisci la frase da trascrivere'));

  const inputRow = el('div');
  inputRow.style.cssText = 'display:flex;gap:0.5rem;align-items:flex-start;flex-wrap:wrap;';

  const inp = el('input','text-input');
  inp.type = 'text';
  inp.id = 'frase-input';
  inp.placeholder = 'Scrivi qui la frase, oppure usa una frase casuale →';
  inp.value = state.customFrase;
  inp.style.cssText = 'flex:1;min-width:0;margin-bottom:0;';
  inp.oninput = e => { state.customFrase = e.target.value; };
  inp.onkeydown = e => {
    if (e.key === 'Enter' && state.customFrase.trim())
      startLookup(state.customFrase.trim());
  };

  const btnRand = btn('↺ Frase casuale');
  btnRand.onclick = () => {
    const f = FRASI[Math.floor(Math.random() * FRASI.length)];
    startLookup(f);
  };

  inputRow.appendChild(inp);
  inputRow.appendChild(btnRand);
  card.appendChild(inputRow);

  if (state.error) {
    const errDiv = el('div');
    errDiv.style.cssText = 'font-family:var(--mono);font-size:0.78rem;color:var(--red);margin-top:0.5rem;';
    errDiv.textContent = state.error;
    card.appendChild(errDiv);
  }

  div.appendChild(card);

  setTimeout(() => {
    const i = document.getElementById('frase-input');
    if (i) i.focus();
  }, 0);

  return div;
}

// Allinea due stringhe per il confronto visivo (Levenshtein backtracking)
function allineaStringhe(a, b) {
  const m = a.length, n = b.length;
  // Costruisci matrice DP
  const dp = Array.from({length: m+1}, (_, i) => Array.from({length: n+1}, (_, j) => i === 0 ? j : j === 0 ? i : 0));
  for (let i = 1; i <= m; i++)
    for (let j = 1; j <= n; j++)
      dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1] : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);

  // Backtrack
  const allineamento = [];
  let i = m, j = n;
  while (i > 0 || j > 0) {
    if (i > 0 && j > 0 && a[i-1] === b[j-1]) {
      allineamento.unshift([a[i-1], b[j-1]]); i--; j--;
    } else if (j > 0 && (i === 0 || dp[i][j-1] <= dp[i-1][j] && dp[i][j-1] <= dp[i-1][j-1])) {
      allineamento.unshift([null, b[j-1]]); j--;  // inserzione
    } else if (i > 0 && (j === 0 || dp[i-1][j] <= dp[i][j-1] && dp[i-1][j] <= dp[i-1][j-1])) {
      allineamento.unshift([a[i-1], null]); i--;  // cancellazione
    } else {
      allineamento.unshift([a[i-1], b[j-1]]); i--; j--;  // sostituzione
    }
  }
  return allineamento;
}

// ═══════════════════════════════════════════════════════
// AZIONI
// ═══════════════════════════════════════════════════════
async function startLookup(frase) {
  setState({ frase, page: 1, error: '', result: null, ipaValue: '', userChoices: {} });
  const { results, needsInput } = await doLookup(frase);
  setState({ infoParole: results, needsInput });
  if (needsInput.length > 0) {
    setState({ page: 2 });
  } else {
    setState({ page: 3 });
  }
}

function setChoice(word, key, val) {
  const prev = state.userChoices[word] || {};
  const updated = {...prev};
  if (val === null) delete updated[key]; else updated[key] = val;
  state.userChoices = {...state.userChoices, [word]: updated};
  render();
}

function getEffectiveWiktFn() {
  const map = {};
  state.infoParole.forEach(info => { map[info.word] = info; });
  return function(parola) {
    const p = parola.toLowerCase().trim();
    if (map[p]) return map[p];
    const ch = state.userChoices[p] || {};
    const v = ch.v || null;
    const sz = ch.sz || null;
    const qualita = ['ɛ','ɔ'].includes(v) ? 'aperta' : ['e','o'].includes(v) ? 'chiusa' : 'normale';
    return {
      trovato: true, omografi: [], s_sonore: [],
      z_indici_sonori: sz === 'dz' ? [0] : [],
      accento: v ? { posizione: -1, qualita, vocale: v } : null,
      has_voiced_s: sz === 'z', has_voiced_z: sz === 'dz',
      has_voiceless_z: sz === 'ts', has_epsilon: v === 'ɛ',
      has_open_o: v === 'ɔ', source: 'utente',
    };
  };
}

function verifica() {
  const wf = getEffectiveWiktFn();
  const res = trascrivi(state.frase, wf);
  if (res.richiesta_utente) { setState({ error: res.messaggio }); return; }
  const esito = confronta(state.ipaValue, res.trascrizione);
  setState({ result: { trascrizione_corretta: res.trascrizione, esito, log_scontri: res.log_scontri, soloSol: false } });
}

function mostraSoluzione() {
  const wf = getEffectiveWiktFn();
  const res = trascrivi(state.frase, wf);
  if (res.richiesta_utente) { setState({ error: res.messaggio }); return; }
  setState({ result: { trascrizione_corretta: res.trascrizione, esito: 'corretto', log_scontri: res.log_scontri, soloSol: true } });
}

function reset() {
  state = { page:0, frase:'', customFrase:'', infoParole:[], needsInput:[], userChoices:{}, ipaValue:'', result:null, error:'' };
  render();
}

function insertSym(sym) {
  const ta = document.getElementById('ipa-input');
  if (!ta) return;
  const st = ta.selectionStart, en = ta.selectionEnd;
  const newVal = state.ipaValue.slice(0,st) + sym + state.ipaValue.slice(en);
  state.ipaValue = newVal;
  render();
  setTimeout(() => {
    const t = document.getElementById('ipa-input');
    if (t) { t.selectionStart = t.selectionEnd = st + sym.length; t.focus(); }
  }, 0);
}

function buildNoteItems() {
  const items = [];
  state.infoParole.forEach(info => {
    const pp = [];
    if (info.has_epsilon) pp.push('e→ɛ');
    if (info.has_open_o) pp.push('o→ɔ');
    if (info.has_voiced_s) pp.push('s→z');
    if (info.has_voiced_z) pp.push('z→dz');
    if (info.has_voiceless_z) pp.push('z→ts');
    if (pp.length) items.push({ word: info.word, src: 'wiktionary', pp });
  });
  Object.entries(state.userChoices).forEach(([w,ch]) => {
    const pp = [];
    if (ch.v) pp.push(`vocale→${ch.v}`);
    if (ch.sz) pp.push(`sz→${ch.sz}`);
    if (pp.length) items.push({ word: w, src: 'utente', pp });
  });
  return items;
}

const VOCALI = new Set('aeiouàèéòóùìɛɔ');
const VOCALI_ACCENTATE = new Set('àèéòóùì');
const VOCALI_ATONE = new Set('aeiouɛɔ');
const CONSONANTI_SONORE = new Set('bdgvlmnr');
const AFFRICATE_DOPPIE = ['ttʃ','ddʒ','tts','ddz'];
const AFFRICATE_SCEMPIE = ['tʃ','dʒ','ts','dz'];

// Parole grammaticali sempre atone — non ricevono mai accento da Wiktionary
const PAROLE_ATONE = new Set([
  'che','se','e','a','su','i','il','lo','la','gli','le','un','uno','una',
  'di','da','in','con','per','tra','fra','al','del','nel','col','sul',
  'mi','ti','si','ci','vi','lo','la','li','le','ne','gli',
  'non','ma','però','anche','già','più','meno','molto','poco',
]);

const LISTA_ACUTO = new Set(['sé','né','perché','affinché','benché','poiché','giacché','finché','sicché','poté']);
// Parole attivanti nella forma TRASLITTERATA
// che→ke, qualche→kwàlke, ho→ò, ha→à (tonica, diversa da a preposizione)
// hai/i esclusi: finali troppo comuni in altre parole
const PAROLE_ATTIVANTI = new Set(['kwàlke','ke','e','se','a','su','ò','à','fà','và','sà','stà']);
const PAROLE_RADDOPPIO_INIZIALE = new Set(['dio','dea','dei','dee']);
const LETTERE_ALFABETO = {A:'à',B:'bbì',C:'ccì',D:'ddì',E:'è',F:'èffe',G:'ggì',H:'àcca',I:'ì',J:'ggèi',K:'kàppa',L:'èlle',M:'èmme',N:'ènne',O:'ò',P:'ppì',Q:'ccù',R:'èrre',S:'èsse',T:'ttì',U:'ù',V:'vvì',W:'dòppjavvì',X:'ìks',Y:'ìpsilon',Z:'zzèta'};

function isVocale(c) { return VOCALI.has(c); }
function isConsonante(c) { return c && !VOCALI.has(c) && !['|','$','.','\'','ˌ','ˈ'].includes(c); }
function isVocaleAccentata(c) { return VOCALI_ACCENTATE.has(c); }

function tokenizza(testo) {
  const matches = testo.match(/[.,;:!?]|[^\s.,;:!?]+/g) || [];
  return matches;
}

function contaVocaliAccentateNonFinali(parola) {
  let count = 0;
  for (let i = 0; i < parola.length-1; i++) {
    if (VOCALI_ACCENTATE.has(parola[i])) count++;
  }
  return count;
}

function haVocaleAccentataNoFinale(parola) {
  for (let i = 0; i < parola.length-1; i++) {
    if (VOCALI_ACCENTATE.has(parola[i])) return true;
  }
  return false;
}

function isMonosillabo(parola) {
  // Salta la u di qu e le semivocali u/i prevocaliche
  const p = parola.replace(/qu/gi, 'q_');
  const chars = [...p];
  let nuclei = 0;
  for (let k = 0; k < chars.length; k++) {
    if (VOCALI.has(chars[k])) {
      // u/i non accentate seguite da vocale = semivocale, non conta come nucleo
      const seguente = chars[k+1] || '';
      if ('ui'.includes(chars[k]) && VOCALI.has(seguente)) continue;
      nuclei++;
    }
  }
  return nuclei === 1;
}

function forzaAccento(parola) {
  const pl = parola.toLowerCase().replace(/[.,;:!?]/g,'');
  if (LISTA_ACUTO.has(pl)) {
    return parola.replace(/[eè]/i, 'é');
  } else {
    return parola.replace(/é/g,'è').replace(/ó/g,'ò');
  }
}

function traslittera(p) {
  const VOCALI_PIENE = 'aàeèéoòóuù';
  const seguitoDaVocalePiena = (s, pos, len) => {
    const idx = pos + len;
    return idx < s.length && VOCALI_PIENE.includes(s[idx]);
  };

  // Funzione ausiliaria per sostituzione iterativa
  function sostituisci(p, rules) {
    let result = '';
    let i = 0;
    while (i < p.length) {
      let matched = false;
      for (const [from, to, cond] of rules) {
        if (p.slice(i, i+from.length) === from) {
          if (!cond || cond(p, i, from.length)) {
            result += to;
            i += from.length;
            matched = true;
            break;
          }
        }
      }
      if (!matched) { result += p[i]; i++; }
    }
    return result;
  }

  // sc
  p = sostituisci(p, [
    ['sci', 'ʃ', (s,i,l) => seguitoDaVocalePiena(s,i,l)],
    ['scì', 'ʃì'],
    ['sci', 'ʃi'],
    ['sce', 'ʃe'],
    ['scé', 'ʃé'],
    ['scè', 'ʃè'],
  ]);
  // cci
  p = sostituisci(p, [
    ['cci', 'ttʃ', (s,i,l) => seguitoDaVocalePiena(s,i,l)],
    ['cci', 'ttʃi'],
    ['ccì', 'ttʃì'],
    ['cce', 'ttʃe'],
    ['ccè', 'ttʃè'],
    ['ccé', 'ttʃé'],
  ]);
  // ci
  p = sostituisci(p, [
    ['ci', 'tʃ', (s,i,l) => seguitoDaVocalePiena(s,i,l)],
    ['ci', 'tʃi'],
    ['cì', 'tʃì'],
    ['ce', 'tʃe'],
    ['cè', 'tʃè'],
    ['cé', 'tʃé'],
  ]);
  // c -> k
  p = p.replace(/c/g,'k').replace(/C/g,'K');
  // sh -> ʃ
  p = p.replace(/sh/g,'ʃ');
  // gli
  p = sostituisci(p, [
    ['gli', 'ʎ', (s,i,l) => seguitoDaVocalePiena(s,i,l)],
    ['glì', 'ʎì'],
    ['gli', 'ʎi'],
  ]);
  // ggi
  p = sostituisci(p, [
    ['ggi', 'ddʒ', (s,i,l) => seguitoDaVocalePiena(s,i,l)],
    ['ggì', 'ddʒì'],
    ['ggi', 'ddʒi'],
    ['gge', 'ddʒe'],
    ['ggè', 'ddʒè'],
    ['ggé', 'ddʒé'],
  ]);
  // gi
  p = sostituisci(p, [
    ['gi', 'dʒ', (s,i,l) => seguitoDaVocalePiena(s,i,l)],
    ['gì', 'dʒì'],
    ['gi', 'dʒi'],
    ['ge', 'dʒe'],
    ['gè', 'dʒè'],
    ['gé', 'dʒé'],
  ]);
  // gn
  p = sostituisci(p, [
    ['gni', 'ɲ', (s,i,l) => seguitoDaVocalePiena(s,i,l)],
    ['gn', 'ɲ'],
  ]);
  // ġ -> g
  p = p.replace(/ġ/g,'g').replace(/Ġ/g,'G');
  // h -> ''
  p = p.replace(/h/g,'').replace(/H/g,'');
  // qu → kw (prima di q→k, altrimenti u rimane e non diventa semivocale)
  p = p.replace(/qu/g, 'kw').replace(/Qu/g, 'Kw').replace(/QU/g, 'KW');
  // q → k (per eventuali q rimaste)
  p = p.replace(/q/g,'k').replace(/Q/g,'K');
  // ṣ -> z
  p = p.replace(/ṣ/g,'z');

  return p;
}

function raddoppiaFinalePrestiti(parola) {
  if (parola.length < 2) return parola;
  const ultima = parola[parola.length-1];
  const penultima = parola[parola.length-2];
  if (!'lmnr'.includes(ultima) && !VOCALI.has(ultima) && VOCALI.has(penultima)) {
    return parola + ultima;
  }
  return parola;
}

function elaboraParola(parola, wiktFn) {
  // Lettera alfabeto isolata (maiuscola singola)
  if (LETTERE_ALFABETO[parola]) {
    return { frammento: LETTERE_ALFABETO[parola] + '$', richiesta: false };
  }

  // Converti in minuscolo (salvo segnaccenti già presenti)
  parola = parola.toLowerCase();

  if (contaVocaliAccentateNonFinali(parola) > 1) {
    return { frammento: parola, richiesta: true, msg: `La parola "${parola}" ha più di un segnaccento. Riscrivila con uno solo.` };
  }

  let haSegnaccento = haVocaleAccentataNoFinale(parola);

  if (isMonosillabo(parola)) {
    parola = forzaAccento(parola);
  }

  // Wiktionary lookup
  const ris = wiktFn(parola.toLowerCase().replace(/[^a-zà-ùɛɔ]/gi,''));

  if (!ris.trovato) {
    return { frammento: parola, richiesta: true, msg: `La parola "${parola}" non è stata trovata. Fornisci la trascrizione manualmente.` };
  }

  // Applica s/z da Wiktionary
  if (ris.has_voiced_s) {
    parola = parola.replace(/(?<=[aeiouàèéòóùì])s(?=[aeiouàèéòóùì])/g, 'ṣ');
  }
  parola = parola.replace(/z/g, ris.has_voiced_z ? 'dz' : 'ts');

  // Accento da Wiktionary — salta per parole grammaticali atone
  const parolaBase = parola.replace(/[^a-zà-ùɛɔ]/gi,'');
  if (!haSegnaccento && ris.accento && !PAROLE_ATONE.has(parolaBase)) {
    const acc = ris.accento;

    if (acc.tipo === 'it-pr' && ris.accentoGrafico) {
      const formaItPr = ris.accentoGrafico.toLowerCase();
      const mappa = {'à':'a','è':'e','é':'e','ò':'o','ó':'o','ù':'u','ì':'i'};
      // Trova la vocale accentata nella forma it-pr e il suo indice tra le vocali
      let indiceVocaleItPr = 0; // quante vocali sono venute prima nella forma it-pr
      let vaItPr = null;
      const tutteVocali = 'aeiouàèéòóùì';
      for (let k = 0; k < formaItPr.length; k++) {
        if (mappa[formaItPr[k]]) { vaItPr = formaItPr[k]; break; }
        if (tutteVocali.includes(formaItPr[k])) indiceVocaleItPr++;
      }
      if (vaItPr !== null) {
        const mappaAccento = {'à':'à','è':'è','é':'é','ò':'ò','ó':'ó','ù':'ù','ì':'ì',
          'a':'à','e':'è','o':'ò','i':'ì','u':'ù'};
        const vAccentata = vaItPr in {'à':1,'è':1,'é':1,'ò':1,'ó':1,'ù':1,'ì':1} ?
          vaItPr : mappaAccento[mappa[vaItPr]] || mappa[vaItPr];
        const vBase = mappa[vaItPr] || vaItPr;
        // Trova la vocale all'indice corretto nella parola ortografica
        // saltando la u di qu (non è vocale sillabica)
        const parolaPerConteggio = parola.replace(/qu/gi, 'q_');
        let conta = 0, posTonica = -1;
        for (let k = 0; k < parolaPerConteggio.length; k++) {
          if ('aeiou'.includes(parolaPerConteggio[k])) {
            if (conta === indiceVocaleItPr) { posTonica = k; break; }
            conta++;
          }
        }
        if (posTonica >= 0) {
          // Non accentare se la vocale è una semivocale (u/i seguita da vocale)
          const seguente = parola[posTonica + 1] || '';
          const isSemivocale = 'ui'.includes(parola[posTonica]) && 'aeiouàèéòóùì'.includes(seguente);
          if (!isSemivocale) {
            parola = parola.slice(0, posTonica) + vAccentata + parola.slice(posTonica + 1);
          }
        } else {
          // Fallback: sostituisci prima occorrenza
          const re = new RegExp(`(?<![àèéòóùì])${vBase}(?![àèéòóùì])`, 'i');
          parola = parola.replace(re, vAccentata);
        }
      }
    } else if (acc.vocale) {
      // Caso IPA: vocale tonica nota — usa indice 0 (prima vocale), saltando u di qu
      const vOrtografico = {'ɛ':'e','ɔ':'o','e':'e','o':'o','a':'a','i':'i','u':'u'}[acc.vocale] || acc.vocale;
      const vAccentata = {'ɛ':'è','ɔ':'ò','e':'é','o':'ó','a':'à','i':'ì','u':'ù'}[acc.vocale] || acc.vocale;
      const parolaPerConteggio = parola.replace(/qu/gi, 'q_');
      let posTonica = -1;
      for (let k = 0; k < parolaPerConteggio.length; k++) {
        if (parolaPerConteggio[k] === vOrtografico) { posTonica = k; break; }
      }
      if (posTonica >= 0) {
        const seguente = parola[posTonica + 1] || '';
        const isSemivocale = 'ui'.includes(parola[posTonica]) && 'aeiouàèéòóùì'.includes(seguente);
        if (!isSemivocale) {
          parola = parola.slice(0, posTonica) + vAccentata + parola.slice(posTonica + 1);
        }
      } else {
        const re = new RegExp(`(?<![àèéòóùì])${vOrtografico}(?![àèéòóùì])`, 'i');
        parola = parola.replace(re, vAccentata);
      }
    }
    // caso 'piano': parola piana regolare, lasciamo senza accento
    // (verrà trattata come sdrucciola dall'algoritmo se non trova accento)
  }

  // Default piano: se parola polisillabica ancora senza accento,
  // metti accento sulla penultima vocale (regola piana)
  // Salta la u di qu (non è vocale sillabica)
  if (!isMonosillabo(parola) && !haVocaleAccentataNoFinale(parola)) {
    const parolaPerConteggio = parola.replace(/qu/gi, 'q_');
    const posVocali = [];
    for (let k = 0; k < parolaPerConteggio.length; k++) {
      if ('aeiou'.includes(parolaPerConteggio[k])) posVocali.push(k);
    }
    if (posVocali.length >= 2) {
      const pos = posVocali[posVocali.length - 2];
      const mappaGrave = { a:'à', e:'è', o:'ò', i:'ì', u:'ù' };
      parola = parola.slice(0, pos) + (mappaGrave[parola[pos]] || parola[pos]) + parola.slice(pos+1);
    }
  }

  // ─── Controllo iati i/u ───────────────────────────────────────────
  const _lemmaKey = parola.replace(/[^a-zà-ùɛɔ]/gi, '').toLowerCase();
  if (IATI_IU[_lemmaKey]) {
    parola = IATI_IU[_lemmaKey];
  } else if (IATI_AMBIGUI[_lemmaKey]) {
    return { frammento: parola, richiesta: true,
      msg: `La parola "${parola}" ha doppia lettura: ${IATI_AMBIGUI[_lemmaKey].opzioni.join(' / ')}. Quale intendi?` };
  }

  // Traslitterazione
  parola = traslittera(parola);

  // Raddoppiamento finale prestiti
  parola = raddoppiaFinalePrestiti(parola);

  return { frammento: parola + '$', richiesta: false };
}

function pulisciDoppiepausa(frase) {
  // Consonante doppia prima di | o $
  frase = frase.replace(/(.)\1(\|)/g, '$1$2');
  frase = frase.replace(/(.)\1(\$)$/g, '$1$2');
  return frase;
}

function raddoppiamentoFonosintattico(frase) {
  // 3a: parole con raddoppiamento iniziale fisso (dio, dea, dei, dee)
  // Solo se precedute da vocale (non da consonante né da inizio stringa)
  for (const parola of PAROLE_RADDOPPIO_INIZIALE) {
    const re = new RegExp('([aeiouàèéòóùìɛɔ|])\\$(' + parola + ')', 'g');
    frase = frase.replace(re, (m, pre, p) => pre + '$' + p[0] + p);
  }

  // Helper: controlla se pos è inizio di s/z+consonante
  function isSImpura(frase, pos) {
    const c = frase[pos];
    if (c !== 's' && c !== 'z') return false;
    const next = frase[pos+1];
    return next && !VOCALI.has(next) && next !== '$' && next !== '|';
  }

  // Helper: controlla se c'è già una doppia (es. bb, tt...)
  function isGiaDopp(frase, pos) {
    return frase[pos] === frase[pos+1];
  }

  // 3b: RF dopo vocale tonica finale (ossitone)
  // pattern: VOCALE_ACCENTATA + $ + C (qualsiasi consonante)
  // escludi: s/z+C (s impura), doppia già presente
  let risultato = '';
  let i = 0;
  while (i < frase.length) {
    if (VOCALI_ACCENTATE.has(frase[i]) && frase[i+1] === '$' && i+2 < frase.length) {
      const posC = i+2;
      const c = frase[posC];
      if (!isSImpura(frase, posC) && !isGiaDopp(frase, posC)) {
        // Raddoppia: elimina $ e inserisce C+C
        risultato += frase[i] + c + c;
        i += 3;
        continue;
      }
    }
    risultato += frase[i];
    i++;
  }
  frase = risultato;

  // 3c: RF dopo parole attivanti
  // Le parole attivanti devono essere parole intere:
  // precedute da inizio stringa, | oppure $
  for (const att of PAROLE_ATTIVANTI) {
    const escaped = att.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    // Lookahead negativo per assicurarci che "att" sia preceduto da $, |, o inizio
    const re = new RegExp('(^|\\$|\\|)(' + escaped + ')\\$(.)', 'g');
    frase = frase.replace(re, (m, pre, parola, c, offset) => {
      const posC = offset + pre.length + parola.length + 1;
      if (isSImpura(frase, posC)) return pre + parola + '$' + c;
      if (isGiaDopp(frase, posC)) return pre + parola + '$' + c;
      return pre + parola + c + c;
    });
  }

  // 3d: rimuovi tutti i $
  frase = frase.replace(/\$/g, '');
  return frase;
}

function autogeminazioni(frase) {
  const CONS = new Set('bdgvlmnrptkfszʃʎɲ');
  function isC(c) { return c && CONS.has(c); }

  // tʃ e dʒ NON si autogeminano (solo ʃ ʎ ɲ ts dz)
  // ATTENZIONE: cercare ts SOLO se non è parte di tʃ (cioè non seguita da ʃ)
  // e cercare dz SOLO se non è parte di dʒ (cioè non seguita da ʒ)
  const simboli = [
    { sym: 'ts', rad: 'tts', esclude: 'ʃ' },  // non raddoppiare tʃ
    { sym: 'dz', rad: 'ddz', esclude: 'ʒ' },  // non raddoppiare dʒ
    { sym: 'ʃ', rad: 'ʃʃ', esclude: null },
    { sym: 'ʎ', rad: 'ʎʎ', esclude: null },
    { sym: 'ɲ', rad: 'ɲɲ', esclude: null },
  ];

  for (const { sym, rad, esclude } of simboli) {
    let i = 0;
    let result = '';
    while (i < frase.length) {
      if (frase.slice(i, i+sym.length) === sym) {
        // Controlla che non faccia parte di un'affricata (es. ts non deve matchare in tʃ)
        const carattereSeguente = frase[i + sym.length] || null;
        if (esclude && carattereSeguente === esclude) {
          // È parte di un'affricata (tʃ o dʒ), non raddoppiare
          result += frase[i];
          i++;
          continue;
        }
        const pre = i > 0 ? frase[i-1] : null;
        const post = carattereSeguente;
        const preOk = !pre || !isC(pre);
        const postOk = !post || !isC(post);
        if (preOk && postOk) {
          result += rad;
        } else {
          result += sym;
        }
        i += sym.length;
      } else {
        result += frase[i];
        i++;
      }
    }
    frase = result;
  }
  return frase;
}

function eliminaIPalatali(frase) {
  const palatali = ['ʃi','ʎi','ɲi','tʃi','dʒi'];
  const VOCALI_STR = 'aeiouàèéòóùìɛɔ';
  for (const pal of palatali) {
    const base = pal.slice(0,-1);
    const re = new RegExp(pal.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + `(?=[${VOCALI_STR}])`, 'g');
    frase = frase.replace(re, base);
  }
  return frase;
}

function sonorizzaS(frase) {
  const SONORE = 'bdgvlmnr';
  let result = [...frase];
  for (let i = 0; i < result.length; i++) {
    if (result[i] === 's') {
      const pre = i > 0 ? result[i-1] : null;
      const post = result[i+1] || null;
      if (post && SONORE.includes(post) && pre !== 's') {
        result[i] = 'z';
      }
    }
  }
  return result.join('');
}

// Sillabificazione
function tokenizzaFonetica(s) {
  const tokens = [];
  let i = 0;
  while (i < s.length) {
    let matched = false;
    for (const aff of [...AFFRICATE_DOPPIE, ...AFFRICATE_SCEMPIE]) {
      if (s.slice(i, i+aff.length) === aff) {
        tokens.push(aff); i += aff.length; matched = true; break;
      }
    }
    if (!matched) { tokens.push(s[i]); i++; }
  }
  return tokens;
}

function sillabifica(frase) {
  const VOCALI_SET = new Set('aeiouàèéòóùìɛɔ');
  const LIQUIDE = new Set('lr');
  const OSTRUENTI = new Set('pbtdkgfvszʃtʃdʒtsdz');

  const isV = c => VOCALI_SET.has(c[0]);
  const isC = c => c && !VOCALI_SET.has(c[0]) && c !== '|' && c !== '.';

  const blocchi = frase.split('|');
  const risultati = [];

  for (const blocco of blocchi) {
    if (!blocco) { risultati.push(''); continue; }
    const tokens = tokenizzaFonetica(blocco);
    const n = tokens.length;
    const punti = new Array(n).fill(false);

    let i = 0;
    while (i < n) {
      if (!isV(tokens[i])) { i++; continue; }

      // Raccoglie consonanti fino alla prossima vocale
      let j = i+1;
      const cons = [];
      while (j < n && !isV(tokens[j])) { cons.push([j, tokens[j]]); j++; }
      const hasNextV = j < n;
      const nc = cons.length;

      if (nc === 0) {
        if (hasNextV) punti[j] = true; // V.V
      } else if (nc === 1) {
        const [idx, c] = cons[0];
        if (hasNextV) {
          if (AFFRICATE_DOPPIE.includes(c)) {
            // affricata doppia: Vt.tʃV — punto PRIMA e poi interno
            // Per semplicità: punto prima del token affricato doppio
            // poi nella stampa lo splittiamo
            punti[idx] = true;
          } else {
            // tutto con incipit (consonante singola, affricata scempia, ecc.)
            punti[idx] = true;
          }
        }
      } else if (nc === 2) {
        const [idx1, c1] = cons[0];
        const [idx2, c2] = cons[1];
        if (c1 === c2) {
          // doppia: VC.CV
          if (hasNextV) punti[idx2] = true;
        } else if (c1 === 's' || c1 === 'z') {
          // s/z + C
          if (i > 0) punti[idx1] = true; // non inizio blocco
          if (hasNextV) punti[idx2] = true;
        } else if (LIQUIDE.has(c2[0]) && OSTRUENTI.has(c1[0])) {
          // nesso indivisibile: V.C1C2V
          if (hasNextV) punti[idx1] = true;
        } else {
          // VC1.C2V
          if (hasNextV) punti[idx2] = true;
        }
      } else {
        // 3+ consonanti
        const [idx1, c1] = cons[0];
        const [idx2, c2] = cons[1];
        const [idx3, c3] = cons[2];
        if (c1 === 's' || c1 === 'z') {
          if (i > 0) punti[idx1] = true;
          if (LIQUIDE.has(c3[0]) && OSTRUENTI.has(c2[0])) {
            // s + nesso indivisibile: tutto incipit
          } else {
            if (hasNextV) punti[idx3] = true;
          }
        } else {
          if (hasNextV) punti[idx2] = true;
        }
      }
      i++;
    }

    // Costruisci stringa con punti e gestione affricate doppie
    let parti = '';
    for (let k = 0; k < tokens.length; k++) {
      const t = tokens[k];
      if (punti[k] && k > 0) {
        if (AFFRICATE_DOPPIE.includes(t)) {
          // ddʒ → d.dʒ, ttʃ → t.tʃ, tts → t.ts, ddz → d.dz
          // Il punto va dopo il primo carattere (la fase occlusiva singola)
          parti += t[0] + '.' + t.slice(1);
          continue;
        }
        parti += '.' + t;
      } else {
        parti += t;
      }
    }
    risultati.push(parti);
  }

  return risultati.join('|');
}

function individuaJW(frase) {
  const VOCALI_STR = 'aeiouàèéòóùìɛɔ';
  // i non accentata + vocale (ï è protetta)
  frase = frase.replace(/i(?=[aeiouàèéòóùìɛɔ])/g, 'j');
  // u non accentata + vocale (ü è protetta)
  frase = frase.replace(/u(?=[aeiouàèéòóùìɛɔ])/g, 'w');
  // Ripristino caratteri protettivi
  frase = frase.replace(/ü/g, 'u').replace(/ï/g, 'i');
  return frase;
}

function sinalefe(frase) {
  const AT = 'aeiouɛɔ';
  // elimina punto tra vocale atona e vocale atona
  frase = frase.replace(new RegExp(`([${AT}])\\.([${AT}])`, 'g'), '$1$2');
  // elimina tutti i |
  frase = frase.replace(/\|/g, '');
  return frase;
}

function costruisciSillabe(frase) {
  const parti = frase.split('.');
  if (!parti.length) return [];
  const sillabe = [parti[0]];
  for (let k = 1; k < parti.length; k++) sillabe.push('.' + parti[k]);
  return sillabe;
}

const MAPPA_ACCENTO = { 'à':'a','ì':'i','é':'e','ó':'o','ù':'u','è':'ɛ','ò':'ɔ' };

function marcaToniche(sillabe) {
  return sillabe.map(sillaba => {
    for (const [acc, base] of Object.entries(MAPPA_ACCENTO)) {
      if (sillaba.includes(acc)) {
        let nuova = sillaba.replace(acc, base);
        // Aggiunge ˈ all'inizio della sillaba
        if (nuova.startsWith('.')) nuova = '.ˈ' + nuova.slice(1);
        else nuova = 'ˈ' + nuova;
        // Cronema: se la sillaba tonica è aperta (finisce per vocale), allunga la vocale
        // Sillaba aperta = l'ultimo carattere è una vocale
        const core = nuova.replace(/^[.ˈˌ]*/,'');
        if (VOCALI_ATONE.has(core[core.length-1]) || ['ɛ','ɔ'].includes(core[core.length-1])) {
          // Inserisci ː dopo la vocale tonica (che è l'unica vocale accentata nella sillaba)
          nuova = nuova.replace(base, base + 'ː');
        }
        return nuova;
      }
    }
    return sillaba;
  });
}

function risolviScontri(sillabe) {
  const log = [];
  let cambiamento = true;
  while (cambiamento) {
    cambiamento = false;
    for (let i = 0; i < sillabe.length-1; i++) {
      const s1 = sillabe[i].replace(/^\./,'');
      const s2 = sillabe[i+1].replace(/^\./,'');
      if (s1.startsWith('ˈ') && s2.startsWith('ˈ')) {
        const punto = sillabe[i].startsWith('.') ? '.' : '';
        sillabe[i] = punto + sillabe[i].replace(/^\./,'').slice(1);
        log.push(`Scontro accentuale: deaccentata "${sillabe[i]}" prima di "${sillabe[i+1]}"`);
        cambiamento = true;
      }
    }
  }
  return { sillabe, log };
}

function risolviValli(sillabe) {
  const isAtona = s => { const c = s.replace(/^\./,''); return !c.startsWith('ˈ') && !c.startsWith('ˌ'); };
  let cambiamento = true;
  while (cambiamento) {
    cambiamento = false;
    for (let i = 0; i < sillabe.length-2; i++) {
      if (isAtona(sillabe[i]) && isAtona(sillabe[i+1]) && isAtona(sillabe[i+2])) {
        const punto = sillabe[i+1].startsWith('.') ? '.' : '';
        sillabe[i+1] = punto + 'ˌ' + sillabe[i+1].replace(/^\./,'');
        cambiamento = true;
      }
    }
  }
  return sillabe;
}

function trascrivi(testo, wiktFn) {
  // FASE 1: ciclo sui frammenti
  const frammenti = tokenizza(testo);
  let frase = '';

  for (const fr of frammenti) {
    if ('.,;:!?'.includes(fr)) { frase += '|'; continue; }
    const { frammento, richiesta, msg } = elaboraParola(fr, wiktFn);
    if (richiesta) return { trascrizione: '', log_scontri: [], richiesta_utente: true, messaggio: msg };
    frase += frammento;
  }

  // FASE 2: pulizia doppie prima di pausa
  frase = pulisciDoppiepausa(frase);

  // FASE 3: RF
  frase = raddoppiamentoFonosintattico(frase);

  // FASE 4: autogeminazioni
  frase = autogeminazioni(frase);

  // FASE 5: elimina i dopo palatali
  frase = eliminaIPalatali(frase);

  // FASE 6: sonorizzazione s
  frase = sonorizzaS(frase);

  // FASE 7: sillabificazione
  frase = sillabifica(frase);

  // FASE 8: j e w
  frase = individuaJW(frase);

  // FASE 9: sinalefe
  frase = sinalefe(frase);

  // FASE 10: costruisci sillabe
  let sillabe = costruisciSillabe(frase);

  // FASE 11: marca toniche
  sillabe = marcaToniche(sillabe);

  // FASE 12: scontri accentuali
  const { sillabe: s2, log } = risolviScontri(sillabe);
  sillabe = s2;

  // FASE 13: valli accentuali
  sillabe = risolviValli(sillabe);

  // FASE 14: output
  const trascrizione = '[' + sillabe.join('') + ']';
  return { trascrizione, log_scontri: log, richiesta_utente: false, messaggio: '' };
}
